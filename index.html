function ensureTodayJournal(){
  const currentDate = S.journalDate || new Date().toISOString().slice(0,10);
  let j = gj(currentDate);
  if(!j){
    j = {id:currentDate,date:currentDate,accountId:ga()?.id||'',sessionFocus:'NY AM',setupFocus:'A+',bias:'',htfAlign:'Yes',news:'No',macroWindow:'',maxTrades:ga()?.rules?.maxTradesPerDay||3,notesPre:'',review:'',bestTrade:'',worstTrade:'',mistakeTag:'',mood:'',missedTrade:'No'};
  }
  if(!j.accountId) j.accountId = ga()?.id || '';
  return j;
}
function journalInput(label,id,val='',type='text',extra=''){
  if(type==='textarea') return `<div class="fg"><label>${label}</label><textarea id="${id}" rows="3"${extra}>${esc(val||'')}</textarea></div>`;
  if(type==='select') return `<div class="fg"><label>${label}</label><select id="${id}" ${extra}>${val}</select></div>`;
  return `<div class="fg"><label>${label}</label><input id="${id}" value="${esc(val||'')}" ${extra}></div>`;
}
function getJournalCalendarModel(dateStr, aid){
  const base = dateStr ? new Date(dateStr+'T12:00:00') : new Date();
  const year = base.getFullYear();
  const month = base.getMonth();
  const first = new Date(year, month, 1);
  const start = new Date(first);
  start.setDate(first.getDate() - first.getDay());
  const cells = [];
  for(let i=0;i<42;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    const date = d.toISOString().slice(0,10);
    const trades = S.trades.filter(t=>t.date===date && (!aid || t.aid===aid));
    const pnl = trades.reduce((s,t)=>s+(t.pnl||0),0);
    const journal = gj(date);
    cells.push({
      date,
      day:d.getDate(),
      inMonth:d.getMonth()===month,
      isToday:date===new Date().toISOString().slice(0,10),
      isSelected:date===dateStr,
      trades,
      pnl,
      journal
    });
  }
  return {year,month,cells};
}
function renderJournalCalendar(dateStr, aid){
  const model = getJournalCalendarModel(dateStr, aid);
  const monthName = new Date(`${model.year}-${String(model.month+1).padStart(2,'0')}-01T12:00:00`).toLocaleDateString('en-US',{month:'short',year:'numeric'});
  const monthPnl = model.cells.filter(c=>c.inMonth).reduce((s,c)=>s+c.pnl,0);
  const weekNames = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  return `<div class="journal-calendar-wrap">
    <div class="journal-cal-head">
      <div>
        <div class="card-title" style="margin-bottom:4px;">Journal Calendar</div>
        <div class="journal-cal-title">Monthly P/L: <span style="color:${pnlC(monthPnl)}">${$m(monthPnl,2)}</span></div>

      ${model.cells.map(c=>{
        const bg = c.pnl>0?`background:linear-gradient(180deg,rgba(20,83,45,.42),rgba(8,14,25,.98));` : c.pnl<0?`background:linear-gradient(180deg,rgba(127,29,29,.38),rgba(8,14,25,.98));` : '';
        return `<div class="journal-day-cell ${c.isSelected?'is-selected':''} ${c.isToday?'is-today':''} ${c.inMonth?'':'is-other'}" style="${bg}" onmouseenter="showJournalPreview('${c.date}', this)" onmouseleave="hideJournalPreview()" onclick="loadJournalDate('${c.date}');showJournalPreview('${c.date}', this, true)">

          <div class="journal-day-actions">
            <button class="journal-day-quick-btn ${c.journal?'is-edit':''}" onclick="event.stopPropagation();openJournalComposer('${c.date}')">${c.journal?'编辑':'写 Journal'}</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

function renderJournalSuggestionDiff(s){
  const diffs = [];
  const cur = ensureTodayJournal();
  const curMood = (cur.mood||'').trim();
  const curBest = (cur.bestTrade||'').trim();
  const curWorst = (cur.worstTrade||'').trim();
  const curMistake = (cur.mistakeTag||'').trim();
  const curReview = (cur.review||'').trim();
  if(curMood && s.mood && curMood !== s.mood) diffs.push(`当前心情「${curMood}」与自动建议「${s.mood}」不同`);
  if(curBest && s.bestTrade && curBest !== s.bestTrade) diffs.push('“今日最好的一笔”已被你手动改写');
  if(curWorst && s.worstTrade && curWorst !== s.worstTrade) diffs.push('“今日最不该做的一笔”已被你手动改写');
  if(curMistake && s.mistakeTag && curMistake !== s.mistakeTag) diffs.push(`当前错误标签为「${curMistake}」，自动建议为「${s.mistakeTag}」`);
  if(curReview && s.review && curReview !== s.review) diffs.push('盘后总结与系统建议不一致，这通常说明你已经做了主观修正');
  if(!diffs.length) return '';
  return `<div class="journal-suggestion-diff"><strong>当前盘后复盘与自动建议存在差异：</strong><br>${diffs.map(d=>`• ${esc(d)}`).join('<br>')}</div>`;
}

window.showJournalPreview=function(date, el, pin=false){
  const pop = document.getElementById('journal-preview-pop');
  if(!pop) return;
  if(pin) window._journalPreviewPinned = true;
  pop.innerHTML = buildJournalPreviewHTML(date);
  const rect = el.getBoundingClientRect();
  const top = Math.min(window.innerHeight - 20, rect.top + 8);
  let left = rect.right + 12;
  pop.style.left = left + 'px';
  pop.style.top = top + 'px';
  pop.classList.add('show');
  requestAnimationFrame(()=>{
    const pr = pop.getBoundingClientRect();
    if(pr.right > window.innerWidth - 12) pop.style.left = Math.max(12, rect.left - pr.width - 12) + 'px';
    if(pr.bottom > window.innerHeight - 12) pop.style.top = Math.max(12, window.innerHeight - pr.height - 12) + 'px';
  });
}
window.hideJournalPreview=function(force=false){
  const pop = document.getElementById('journal-preview-pop');
  if(!pop) return;
  clearTimeout(window._journalPreviewTimer);
  window._journalPreviewTimer = setTimeout(()=>{
    if(window._journalPreviewPinned && !force) return;
    pop.classList.remove('show');
    if(force) window._journalPreviewPinned = false;
  }, force ? 0 : 90);
}

// Image helpers
window._journalImgBuffer = null;
window.addJournalImgs = function(input){
  const date = document.getElementById('journal-date')?.value;
  const existing = gj(date);
  const current = window._journalImgBuffer || (existing?.images ? [...existing.images] : []);
  const files = Array.from(input.files);
  let done = 0;
  files.forEach(file=>{
    if(!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e=>{
      current.push(e.target.result);
      done++;
      if(done===files.length){
        window._journalImgBuffer = current;
        // Re-render img wrap
        const wrap = document.getElementById('journal-img-wrap');
        if(wrap) wrap.innerHTML = current.map((src,i)=>`<div style="position:relative;border-radius:4px;overflow:hidden;border:1px solid var(--border);">
          <img src="${src}" style="width:120px;height:80px;object-fit:cover;display:block;" onclick="openImgFull(${i})">
          <button onclick="removeJournalImg(${i})" style="position:absolute;top:2px;right:2px;width:18px;height:18px;padding:0;background:rgba(0,0,0,.7);border:none;border-radius:2px;color:#fff;font-size:12px;line-height:1;cursor:pointer;">×</button>
        </div>`).join('');
      }
    };
    reader.readAsDataURL(file);
  });
  input.value='';
};
window.removeJournalImg = function(idx){
  const date = document.getElementById('journal-date')?.value;
  const existing = gj(date);
  const current = window._journalImgBuffer || (existing?.images ? [...existing.images] : []);

  const wrap = document.getElementById('journal-img-wrap');

window.setCompliance=async function(tradeId,action){
  const t=S.trades.find(x=>x.id===tradeId);if(!t||!window.fbUpdateDoc)return;
  const comp={...t.compliance,userConfirmed:true};
  if(action==='to_compliant'){comp.userOverride='compliant';comp.status='compliant';}
  else if(action==='to_suspected'){comp.userOverride='suspected';comp.status='suspected';}
  await window.fbUpdateDoc('trades',tradeId,{compliance:comp});
};

window.reanalyzeAll=async function(){
  if(!window.fbUpdateDoc)return;
  if(!confirm('重新分析所有交易合规状态？已人工审核的结果将保留。'))return;
  setSyncStatus('saving','分析中...');
  for(const t of S.trades){
    const ac=S.accounts.find(a=>a.id===t.aid);if(!ac)continue;
    const prev=t.compliance;
    const newC=CE.analyze(t,ac,S.trades);
    if(prev?.userConfirmed){newC.userConfirmed=prev.userConfirmed;newC.userOverride=prev.userOverride;if(prev.userOverride)newC.status=prev.userOverride;}
    await window.fbUpdateDoc('trades',t.id,{compliance:newC});
  }
  setSyncStatus('ok','已同步');
  alert('✓ 全部交易已重新分析');
};

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=ch;}
    vals.push(cur.trim());
    const obj={};headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim());
    return obj;
  });
}
function parseDateStr(s){
  if(!s)return'';try{const d=new Date(s);if(!isNaN(d))return d.toISOString().slice(0,10);}catch(e){}return s.slice(0,10);
}
function parsePnl(s){if(!s)return 0;const c=String(s).replace(/[$,]/g,'').replace(/\(([^)]+)\)/,'−$1').replace('−','-');return parseFloat(c)||0;}
function parseTimeStr(s){if(!s)return'';const m=s.match(/(\d{1,2}):(\d{2})/);return m?`${m[1].padStart(2,'0')}:${m[2]}`:''}

          date:parseDateStr(r.boughtTimestamp||r.date||''),

          risk:parseFloat(r.risk||'0')||0,note:r.note||r.notes||'',
          tradeQuality:r.tradeQuality||r.quality||r['Trade Quality']||'B',
          shouldTrade:(r.shouldTrade||r['Should Trade']||'yes').toString().toLowerCase()==='no'?'no':'yes',
          shouldTradeReason:r.shouldTradeReason||r.reason||r['Should Trade Reason']||'',
          holdMinutes:parseFloat(r.holdMinutes||r['Hold Minutes']||'0')||0,

          beRunner:(r.beRunner||r['BE Runner']||'na').toString().toLowerCase()
        }));

function normSym(sym){
  if(!sym)return'';
  // Strip contract expiry: MNQH25→MNQ, MNQM25→MNQ, ESH25→ES
  return sym.toUpperCase().replace(/([A-Za-z])([HMUZ]\d{0,2})$/,'$1').replace(/\d+$/,'');
}
function tradeFP(t){
  // Fingerprint without pnl — immune to commission adjustments and CSV rounding
  return`${t.date}|${(t.time||'').slice(0,5)}|${normSym(t.sym)}|${(t.dir||'').toLowerCase().slice(0,2)}|${t.c||1}`;
}
function parseTVSession(ts){if(!ts)return'NY AM';const m=ts.match(/(\d{2}):(\d{2}):\d{2}$/);if(!m)return'NY AM';const h=parseInt(m[1]);if(h>=8&&h<12)return'NY AM';if(h>=12&&h<16)return'NY PM';if(h>=2&&h<8)return'London';return'Asia';}

window.doImport=async function(type){
  const trades=window[`_csv_${type}`];
  const aid=document.getElementById('import-aid').value;
  if(!trades||!aid){alert('请先选择账户并上传文件');return;}
  if(!window.fbSetDoc){alert('请先登录');return;}
  const account=S.accounts.find(a=>a.id===aid);

  // Pick the right commission rate per broker type (single leg; ×2 = round-trip)
  const commOneLeg = type==='ts' ? (parseFloat(document.getElementById('comm-ts')?.value)||0)
                   : type==='tv' ? (parseFloat(document.getElementById('comm-tv')?.value)||0)
                   : 0;
  const commRT = commOneLeg * 2; // round-trip per contract

  // Fingerprint without pnl — immune to commission adjustments and CSV float rounding
  const existingFps=new Set(S.trades.filter(t=>t.aid===aid).map(tradeFP));

  let count=0,skipped=0,commTotal=0;
  setSyncStatus('saving','导入中...');
  for(const t of trades){
    if(!t.date)continue;
    const fp=tradeFP(t);
    if(existingFps.has(fp)){skipped++;continue;}
    existingFps.add(fp); // prevent intra-batch dupes too

    // Deduct round-trip commission per contract (applies to all symbols)
    const contracts=parseInt(t.c)||1;
    const comm=commRT>0?+(commRT*contracts).toFixed(2):0;
    const adjPnl=comm>0?+(t.pnl-comm).toFixed(2):t.pnl;
    commTotal+=comm;

    const newT={id:uid(),aid,...t,pnl:adjPnl,_rawPnl:t.pnl,_commission:comm,
      session:t.session||autoSession(t.date,t.time||''),
      followPlan:true,stopLossRespected:true,revenge:false,fomo:false};
    const rt=calcTradeRiskLabel(newT,aid);
    newT.riskLabel=rt.label;newT.riskScore=rt.score;newT.riskReasons=rt.reasons;
    newT.compliance=CE.analyze(newT,account,[...S.trades,...[newT]]);
    await window.fbSetDoc('trades',newT.id,newT);count++;
  }
  setSyncStatus('ok','已同步');
  updateHeader();
  let msg=`✓ 导入 ${count} 条`;
  if(skipped>0) msg+=`，跳过 ${skipped} 条重复`;
  if(commTotal>0) msg+=`\n已自动扣除手续费合计: $${commTotal.toFixed(2)}（$${commRT}/手往返）`;
  msg+=`\n待审核: ${CE.pendingCount()} 条`;
  alert(msg);
  if(count>0)goPage('compliance');
};

// Auto-suggest commission based on broker when account changes
window.updateCommissionHint=function(){
  const aid=document.getElementById('import-aid')?.value||'';
  const ac=S.accounts.find(a=>a.id===aid);
  const hint=document.getElementById('comm-hint');
  const inp=document.getElementById('import-comm');
  if(!ac||!hint||!inp)return;
  const broker=(ac.broker||'').toLowerCase();
  let rate=0,label='';
  if(broker.includes('lucid')||broker.includes('tradovate')){rate=1;label='Lucid/Tradovate 建议 $1.00/手';}
  else if(broker.includes('topstep')){rate=0.74;label='Topstep 建议 $0.74/手';}
  hint.textContent=label?`(${label})`:'';
  if(label&&(!inp.value||parseFloat(inp.value)===0))inp.value=rate;
};

window.submitAccount=async function(){
  if(!window.fbSetDoc){alert('请先登录');return;}
  const n=document.getElementById('fa-n').value.trim();
  const st=parseFloat(document.getElementById('fa-s').value)||0;
  if(!n||!st){alert('请填写账户名称和规模');return;}
  setSyncStatus('saving','保存中...');
  const data={
    name:n,broker:document.getElementById('fa-b').value.trim(),
    phase:document.getElementById('fa-ph').value,start:st,
    role:document.getElementById('fa-role').value||'primary',
    status:'active',
    fees:{signup:parseFloat(document.getElementById('fa-su').value)||0,activation:parseFloat(document.getElementById('fa-ac').value)||0,reset:parseFloat(document.getElementById('fa-rs').value)||0,other:parseFloat(document.getElementById('fa-ot').value)||0},
    rules:{target:parseFloat(document.getElementById('fa-pt').value)||0,maxDD:parseFloat(document.getElementById('fa-md').value)||0,daily:parseFloat(document.getElementById('fa-dl').value)||0,maxTradesPerDay:parseInt(document.getElementById('fa-mtp').value)||0,minDays:parseInt(document.getElementById('fa-mn').value)||0,trail:document.getElementById('fa-td').checked},
    lotTier:(()=>{const s=document.getElementById('fa-lt').value;if(s==='custom'){return parseInt(document.getElementById('fa-lt-custom').value)||0;}return parseInt(s)||0;})(),
    payoutTarget:parseFloat(document.getElementById('fa-po').value)||0,
  };
  if(window._editAcctId){
    const existing=S.accounts.find(a=>a.id===window._editAcctId);
    if(existing)data.status=existing.status||'active';
    await window.fbSetDoc('accounts',window._editAcctId,data);
    window._editAcctId=null;
  } else {
    await window.fbSetDoc('accounts',uid(),data);
  }
  closeDrawer();
};

window.delAcct=async function(id){
  const ac=S.accounts.find(a=>a.id===id);if(!ac)return;
  if(!confirm(`确认删除账户"${ac.name}"？\n相关交易和出金记录也将删除，不可撤销。`))return;
  if(!window.fbDelDoc)return;
  setSyncStatus('saving','删除中...');
  for(const t of S.trades.filter(t=>t.aid===id))await window.fbDelDoc('trades',t.id);
  for(const w of S.withdrawals.filter(w=>w.aid===id))await window.fbDelDoc('withdrawals',w.id);
  await window.fbDelDoc('accounts',id);
  if(S.aid===id)S.aid=null;
  setSyncStatus('ok','已同步');
};

  const riskTag = calcTradeRiskLabel(trade, ac.id);

['ft-rv','ft-fo','ft-p','ft-rk','ft-t','ft-se'].forEach(id=>{
  const el=document.getElementById(id);
  if(el)el.addEventListener((id==='ft-p'||id==='ft-rk'||id==='ft-t')?'input':'change',()=>{
    const pnl=parseFloat(document.getElementById('ft-p').value)||0;
    const rv=document.getElementById('ft-rv').checked;
    const fo=document.getElementById('ft-fo').checked;
    const hints=checkSmartHints(pnl,rv,fo);
    const ac=ga();
    const tDraft={date:document.getElementById('ft-d').value||new Date().toISOString().slice(0,10),time:document.getElementById('ft-t').value||'',sym:document.getElementById('ft-sy').value,dir:document.getElementById('ft-dr').value,c:parseInt(document.getElementById('ft-c').value)||1,risk:parseFloat(document.getElementById('ft-rk').value)||0,setup:document.getElementById('ft-se').value,tradeQuality:document.getElementById('ft-tq').value,shouldTrade:document.getElementById('ft-should').value,holdMinutes:parseFloat(document.getElementById('ft-hold').value)||0,beHit:document.getElementById('ft-be-hit').value,beRunner:document.getElementById('ft-be-run').value,followPlan:document.getElementById('ft-fp').checked,stopLossRespected:document.getElementById('ft-sl2').checked,revenge:rv,fomo:fo,session:autoSession(document.getElementById('ft-d').value||new Date().toISOString().slice(0,10),document.getElementById('ft-t').value||'')};
    const rt=ac?calcTradeRiskLabel(tDraft,ac.id):{label:'normal',score:0,reasons:[]};
    const engine=ac?calcNextTradeEngine(ac.id):null;
    const h=document.getElementById('smart-hint');
    const lines=[...hints];
    if(engine) lines.unshift(`门禁判断：${engine.status==='allow'?'允许下一笔':engine.status==='caution'?'谨慎允许':'停止下一笔'}｜建议 setup ${engine.allowedSetup}｜建议最大风险 ${$m(engine.maxRisk,0)}`);
    lines.push(`自动 Session：${tDraft.session}（按纽约时间换算）`);
    lines.push(`风险标签预判：${rt.label==='high'?'高风险单':rt.label==='watch'?'观察单':'常规单'}（${rt.score}分）`);
    if(rt.reasons.length) lines.push('触发原因：'+rt.reasons.join('、'));
    if(lines.length>0){h.style.display='block';h.innerHTML=lines.join('<br>');}else h.style.display='none';
  });
});

window.updateLotHint=function(){
  const sel=document.getElementById('fa-lt');
  const wrap=document.getElementById('fa-lt-custom-wrap');
  const hint=document.getElementById('fa-lt-hint');
  if(!sel||!hint)return;
  if(sel.value==='custom'){
    wrap.style.display='block';
    const n=parseInt(document.getElementById('fa-lt-custom').value)||0;
    if(n>0){
      // Risk philosophy: $1000 drawdown = 1 MNQ, max = N+1
      // So N lots → suggested drawdown = (N-1)*1000 → account size ~= N*10000
      const suggestDD=(n-1)*1000;
      const maxLots=n+1;
      hint.innerHTML=`建议最大回撤 ≥ $${suggestDD.toLocaleString()} · 建议风控上限 ${maxLots} 手（N+1 原则）`;
    } else {
      hint.innerHTML='';
    }
  } else {
    wrap.style.display='none';
    const presetHints={'3':'50K 账户 · 建议最大回撤 $2,000 · N+1 = 4 手上限','6':'100K 账户 · 建议最大回撤 $3,000 · N+1 = 7 手上限','10':'150K 账户 · 建议最大回撤 $6,000 · N+1 = 11 手上限','0':'不设限制（仅限观察账户）'};
    hint.innerHTML=presetHints[sel.value]||'';
  }
};

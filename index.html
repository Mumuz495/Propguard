// ── Mini date-range picker for bulk delete ──────────────────────────────────
(function(){
  const state={from:{val:'',curY:0,curM:0},to:{val:'',curY:0,curM:0}};
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const WDS=['Su','Mo','Tu','We','Th','Fr','Sa'];

  function pad(n){return String(n).padStart(2,'0');}
  function ymd(y,m,d){return`${y}-${pad(m+1)}-${pad(d)}`;}
  function todayStr(){const d=new Date();return ymd(d.getFullYear(),d.getMonth(),d.getDate());}

  function renderCal(which){
    const s=state[which];
    const fromV=state.from.val;const toV=state.to.val;
    const y=s.curY,m=s.curM;
    const first=new Date(y,m,1).getDay();
    const days=new Date(y,m+1,0).getDate();
    const today=todayStr();
    let cells='';
    for(let i=0;i<first;i++) cells+=`<div class="bdp-day empty"></div>`;
    for(let d=1;d<=days;d++){
      const ds=ymd(y,m,d);
      let cls='bdp-day';
      if(ds===today) cls+=' today';
      if(ds===fromV) cls+=' sel-start';
      if(ds===toV)   cls+=' sel-end';
      if(fromV&&toV&&ds>fromV&&ds<toV) cls+=' in-range';
      cells+=`<div class="${cls}" onclick="bdpPick('${which}','${ds}')">${d}</div>`;
    }
    document.getElementById(`bdp-${which}-pop`).innerHTML=`
      <div class="bdp-head">
        <button class="bdp-nav" onclick="event.stopPropagation();bdpNav('${which}',-1)">‹</button>
        <span class="bdp-month-lbl">${MONTHS[m]} ${y}</span>
        <button class="bdp-nav" onclick="event.stopPropagation();bdpNav('${which}',1)">›</button>
      </div>
      <div class="bdp-weekdays">${WDS.map(w=>`<div class="bdp-wd">${w}</div>`).join('')}</div>
      <div class="bdp-days">${cells}</div>
      <div class="bdp-footer">
        <button class="btn-sm" onclick="bdpClose('${which}')">关闭</button>
      </div>`;
  }

  window.bdpToggle=function(which){
    const pop=document.getElementById(`bdp-${which}-pop`);
    const isOpen=pop.classList.contains('open');
    // close all first
    document.querySelectorAll('.bdp-pop').forEach(p=>p.classList.remove('open'));
    if(!isOpen){
      if(!state[which].curY){const n=new Date();state[which].curY=n.getFullYear();state[which].curM=n.getMonth();}
      renderCal(which);
      pop.classList.add('open');
    }
  };
  window.bdpClose=function(which){document.getElementById(`bdp-${which}-pop`).classList.remove('open');};
  window.bdpNav=function(which,dir){
    const s=state[which];s.curM+=dir;
    if(s.curM>11){s.curM=0;s.curY++;}
    if(s.curM<0){s.curM=11;s.curY--;}
    renderCal(which);
  };
  window.bdpPick=function(which,ds){
    state[which].val=ds;
    document.getElementById(`bulk-del-${which==='from'?'from':'to'}`).value=ds;
    document.getElementById(`bdp-${which}-label`).textContent=ds;
    document.getElementById(`bdp-${which}-clr`).style.display='inline';
    // re-render both to update range highlight
    if(document.getElementById('bdp-from-pop').classList.contains('open')) renderCal('from');
    if(document.getElementById('bdp-to-pop').classList.contains('open')) renderCal('to');
    bdpClose(which);
  };
  window.bdpClear=function(which){
    state[which].val='';
    document.getElementById(`bulk-del-${which==='from'?'from':'to'}`).value='';
    document.getElementById(`bdp-${which}-label`).textContent='选择日期';
    document.getElementById(`bdp-${which}-clr`).style.display='none';
  };
  // stop clicks inside popup from bubbling to document (use capture on parent wraps)
  document.addEventListener('click',function(e){
    if(e.target.closest('.bdp-pop')) return; // click inside popup — do nothing
    if(!e.target.closest('.bdp-wrap')) document.querySelectorAll('.bdp-pop').forEach(p=>p.classList.remove('open'));
  });
})();

window.bulkDeleteTrades=async function(doDelete){
  const aid=document.getElementById('import-aid')?.value||'';
  if(!aid){alert('请先在上方选择目标账户');return;}
  const fromVal=document.getElementById('bulk-del-from')?.value||'';
  const toVal=document.getElementById('bulk-del-to')?.value||'';
  const resultEl=document.getElementById('bulk-del-result');

  // Filter trades for this account and optional date range
  let targets=S.trades.filter(t=>t.aid===aid);
  if(fromVal) targets=targets.filter(t=>t.date>=fromVal);
  if(toVal)   targets=targets.filter(t=>t.date<=toVal);

  if(targets.length===0){
    resultEl.innerHTML=`<span style="color:var(--muted);">该账户在所选日期范围内没有交易记录。</span>`;
    return;
  }

  if(!doDelete){
    const acName=S.accounts.find(a=>a.id===aid)?.name||aid;
    const dateRange=fromVal||toVal?`（${fromVal||'最早'}  ～  ${toVal||'最新'}）`:'（全部日期）';
    resultEl.innerHTML=`<span style="color:var(--amber);">⚠ 账户「${esc(acName)}」${dateRange} 共 <strong>${targets.length}</strong> 条记录将被删除。确认后点「确认删除」。</span>`;
    return;
  }

  // Confirm before actual delete
  const acName=S.accounts.find(a=>a.id===aid)?.name||aid;
  if(!confirm(`确认删除账户「${acName}」的 ${targets.length} 条交易记录？此操作不可撤销。`))return;
  if(!window.fbDelDoc){alert('请先登录');return;}

  resultEl.innerHTML=`<span style="color:var(--muted);">删除中，请稍候... (0 / ${targets.length})</span>`;
  setSyncStatus('saving','批量删除中...');

  let done=0;
  await window.fbBatchDelete('trades', targets.map(t=>t.id));
  done=targets.length;
  resultEl.innerHTML=`<span style="color:var(--muted);">删除中... (${done} / ${targets.length})</span>`;

  setSyncStatus('ok','已同步');
  updateHeader();
  resultEl.innerHTML=`<span style="color:var(--green);">✓ 已成功删除 ${done} 条记录，可重新导入修正后的 CSV。</span>`;
};

// Smart hint listeners
['ft-rv','ft-fo','ft-p','ft-rk','ft-t','ft-se'].forEach(id=>{
  const el=document.getElementById(id);
  if(el)el.addEventListener((id==='ft-p'||id==='ft-rk'||id==='ft-t')?'input':'change',()=>{
    const pnl=parseFloat(document.getElementById('ft-p').value)||0;
    const rv=document.getElementById('ft-rv').checked;
    const fo=document.getElementById('ft-fo').checked;
    const hints=checkSmartHints(pnl,rv,fo);
    const ac=ga();
    const tDraft={date:document.getElementById('ft-d').value||new Date().toISOString().slice(0,10),time:document.getElementById('ft-t').value||'',sym:document.getElementById('ft-sy').value,dir:document.getElementById('ft-dr').value,c:parseInt(document.getElementById('ft-c').value)||1,risk:parseFloat(document.getElementById('ft-rk').value)||0,setup:document.getElementById('ft-se').value,tradeQuality:document.getElementById('ft-tq').value,shouldTrade:document.getElementById('ft-should').value,holdMinutes:parseFloat(document.getElementById('ft-hold').value)||0,beHit:document.getElementById('ft-be-hit').value,beRunner:document.getElementById('ft-be-run').value,followPlan:document.getElementById('ft-fp').checked,stopLossRespected:document.getElementById('ft-sl2').checked,revenge:rv,fomo:fo,session:autoSession(document.getElementById('ft-d').value||new Date().toISOString().slice(0,10),document.getElementById('ft-t').value||'')};
    const rt=ac?calcTradeRiskLabel(tDraft,ac.id):{label:'normal',score:0,reasons:[]};
    const engine=ac?calcNextTradeEngine(ac.id):null;
    const h=document.getElementById('smart-hint');
    const lines=[...hints];
    if(engine) lines.unshift(`门禁判断：${engine.status==='allow'?'允许下一笔':engine.status==='caution'?'谨慎允许':'停止下一笔'}｜建议 setup ${engine.allowedSetup}｜建议最大风险 ${$m(engine.maxRisk,0)}`);
    lines.push(`自动 Session：${tDraft.session}（按纽约时间换算）`);
    lines.push(`风险标签预判：${rt.label==='high'?'高风险单':rt.label==='watch'?'观察单':'常规单'}（${rt.score}分）`);
    if(rt.reasons.length) lines.push('触发原因：'+rt.reasons.join('、'));
    if(lines.length>0){h.style.display='block';h.innerHTML=lines.join('<br>');}else h.style.display='none';
  });
});

window.updateLotHint=function(){
  const sel=document.getElementById('fa-lt');
  const wrap=document.getElementById('fa-lt-custom-wrap');
  const hint=document.getElementById('fa-lt-hint');
  if(!sel||!hint)return;
  if(sel.value==='custom'){
    wrap.style.display='block';
    const n=parseInt(document.getElementById('fa-lt-custom').value)||0;
    if(n>0){
      // Risk philosophy: $1000 drawdown = 1 MNQ, max = N+1
      // So N lots → suggested drawdown = (N-1)*1000 → account size ~= N*10000
      const suggestDD=(n-1)*1000;
      const maxLots=n+1;
      hint.innerHTML=`建议最大回撤 ≥ $${suggestDD.toLocaleString()} · 建议风控上限 ${maxLots} 手（N+1 原则）`;
    } else {
      hint.innerHTML='';
    }
  } else {
    wrap.style.display='none';
    const presetHints={'3':'50K 账户 · 建议最大回撤 $2,000 · N+1 = 4 手上限','6':'100K 账户 · 建议最大回撤 $3,000 · N+1 = 7 手上限','10':'150K 账户 · 建议最大回撤 $6,000 · N+1 = 11 手上限','0':'不设限制（仅限观察账户）'};
    hint.innerHTML=presetHints[sel.value]||'';
  }
};

// ════ MACRO ANALYSIS helpers for Stats / TradingOS / Journal
// ══════════════════════════════════════════════════════════
function macroBreakdown(trades){
  // Per-macro and overall-macro-vs-non-macro stats
  const list = TIME_ENGINE.settings.macros.filter(m=>m.enabled!==false);
  const perMacro = list.map(m=>{
    const arr = trades.filter(t=> (t.macroWindow||autoMacro(t.date,t.time||'')) === m.name );
    return {
      name: m.name,
      count: arr.length,
      pnl: arr.reduce((s,t)=>s+(t.pnl||0),0),
      wins: arr.filter(t=>(t.pnl||0)>0).length,
      winRate: arr.length ? arr.filter(t=>(t.pnl||0)>0).length/arr.length*100 : 0,
      expectancy: expectancyForTrades(arr),
      avgPnl: arr.length ? arr.reduce((s,t)=>s+(t.pnl||0),0)/arr.length : 0
    };
  });
  const inMacro = trades.filter(t=>{
    const mw = t.macroWindow || autoMacro(t.date,t.time||'');
    return !!mw;
  });
  const outMacro = trades.filter(t=>{
    const mw = t.macroWindow || autoMacro(t.date,t.time||'');
    return !mw;
  });
  const summary = {
    inCount: inMacro.length,
    inPnl: inMacro.reduce((s,t)=>s+(t.pnl||0),0),
    inWR: inMacro.length ? inMacro.filter(t=>(t.pnl||0)>0).length/inMacro.length*100 : 0,
    inExp: expectancyForTrades(inMacro),
    outCount: outMacro.length,
    outPnl: outMacro.reduce((s,t)=>s+(t.pnl||0),0),
    outWR: outMacro.length ? outMacro.filter(t=>(t.pnl||0)>0).length/outMacro.length*100 : 0,
    outExp: expectancyForTrades(outMacro)
  };
  return { perMacro, summary };
}

window.loadMarketEvents = async function(force){
  if(S.mktEventsLoading) return;
  if(!force){
    try{
      const cached = localStorage.getItem('pg_mkt_events');
      const ts = localStorage.getItem('pg_mkt_events_ts');
      if(cached && ts && (Date.now()-parseInt(ts)) < 6*60*60*1000){
        S.marketEvents = JSON.parse(cached);
        S.mktEventsLoaded = true;
        S.mktEventsError = '';
        renderPage();
        return;
      }
    }catch(e){}
  }
  S.mktEventsLoading = true;
  S.mktEventsError = '';
  renderPage();
  const errors = [];
  let events = [];
  for(const url of MKT_CAL.FF_URLS){
    try{
      const xml = await MKT_CAL.fetchWithFallback(url, 15000);
      events = MKT_CAL.parseFFXML(xml);
      if(events.length) break;
    }catch(e){ errors.push(e.message||'fetch error'); }
  }
  // Merge manually added events from localStorage
  try{
    const manual = JSON.parse(localStorage.getItem('pg_mkt_manual')||'[]');
    events = events.concat(manual);
  }catch(e){}
  if(events.length === 0){
    S.mktEventsError = '未能获取 ForexFactory 数据（可能被网络或 CORS 代理阻断）。你可以稍后再试，或手动录入重要事件。';
  } else {
    try{
      localStorage.setItem('pg_mkt_events', JSON.stringify(events));
      localStorage.setItem('pg_mkt_events_ts', Date.now().toString());
    }catch(e){}
  }
  S.marketEvents = events;
  S.mktEventsLoaded = true;
  S.mktEventsLoading = false;
  renderPage();
};

window.addManualEvent = function(){
  const date = prompt('事件日期 (YYYY-MM-DD)：', new Date().toISOString().slice(0,10));
  if(!date) return;
  const time = prompt('事件时间 (FF 时区, 格式 HH:MM；留空=全天)：', '');
  const title = prompt('事件名称：');
  if(!title) return;
  const impact = prompt('影响等级 (High / Medium / Low / Holiday)：', 'High');
  const country = prompt('国家/货币代号 (USD / EUR / CNY / JPY ...)：', 'USD');
  const ev = {
    id:'manual_'+Date.now(),
    source:'manual',
    title, country, date,
    timeNY: time||'',
    impact: impact||'Low',
    forecast:'', previous:'', notes:'手动录入'
  };
  let list = [];
  try{ list = JSON.parse(localStorage.getItem('pg_mkt_manual')||'[]'); }catch(e){}
  list.push(ev);
  try{ localStorage.setItem('pg_mkt_manual', JSON.stringify(list)); }catch(e){}
  S.marketEvents = (S.marketEvents||[]).concat([ev]);
  renderPage();
};

window.deleteManualEvent = function(id){
  if(!confirm('删除这条手动录入的事件？')) return;
  let list = [];
  try{ list = JSON.parse(localStorage.getItem('pg_mkt_manual')||'[]'); }catch(e){}
  list = list.filter(e=>e.id!==id);
  try{ localStorage.setItem('pg_mkt_manual', JSON.stringify(list)); }catch(e){}
  S.marketEvents = S.marketEvents.filter(e=>e.id!==id);
  renderPage();
};

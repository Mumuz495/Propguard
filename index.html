    `Setup ${setups}`,
    `Session ${sessions}`
  ];
  return {nextDate, mode, canTrade, maxTrades, maxRisk, maxLots, setups, sessions, headline, reason, recovery, summary, state, engine};
}
function calcTradeRiskLabel(trade, aid){
  const ac = S.accounts.find(a=>a.id===aid); if(!ac) return {label:'normal',score:0,reasons:[]};
  let score = 0; const reasons = [];
  const engine = calcNextTradeEngine(aid);
  if(engine?.status==='caution'){ score += 20; reasons.push('账户处于谨慎模式'); }
  if(engine?.status==='block'){ score += 40; reasons.push('账户当前不允许下一笔'); }
  if(trade.revenge){ score += 25; reasons.push('报复性交易'); }
  if(trade.fomo){ score += 20; reasons.push('FOMO'); }
  if(trade.tradeQuality==='C'){ score += 18; reasons.push('交易质量 C'); }
  if(trade.shouldTrade==='no'){ score += 22; reasons.push('被标记为不该做'); }
  if(trade.followPlan===false){ score += 12; reasons.push('未按计划'); }
  if(trade.stopLossRespected===false){ score += 15; reasons.push('止损纪律异常'); }
  if((trade.risk||0)>0){
    const avgRisk = calcS(aid)?.avgRisk || 0;
    if(avgRisk>0 && (trade.risk||0) > avgRisk*1.8){ score += 15; reasons.push('单笔风险高于常态'); }
  }
  if(['C'].includes(trade.setup)){ score += 10; reasons.push('低质量 setup'); }
  const session = trade.session || autoSession(trade.date, trade.time||'');
  if(!['NY AM','London'].includes(session)){ score += 8; reasons.push('非核心时段'); }
  const label = score>=45 ? 'high' : score>=20 ? 'watch' : 'normal';
  return {label,score,reasons};
}

function analyzeJournalDay(day, account){
  const dayTrades = S.trades.filter(t=>t.date===day.date && (!account || t.aid===account.id));
  const macroTrades = dayTrades.filter(t=>t.macroWindow||autoMacro(t.date,t.time||''));
  const nonMacroTrades = dayTrades.filter(t=>!(t.macroWindow||autoMacro(t.date,t.time||'')));
  const macroCounts = {};
  macroTrades.forEach(t=>{
    const mw = t.macroWindow || autoMacro(t.date,t.time||'');
    if(mw){ macroCounts[mw] = (macroCounts[mw]||0) + 1; }
  });
  const stats = {
    tradeCount: dayTrades.length,
    pnl: dayTrades.reduce((s,t)=>s+(t.pnl||0),0),
    violations: dayTrades.filter(t=>t.compliance?.status==='violation').length,
    suspected: dayTrades.filter(t=>t.compliance?.status==='suspected').length,
    highRisk: dayTrades.filter(t=>t.riskLabel==='high').length,
    followRate: dayTrades.length ? dayTrades.filter(t=>t.followPlan!==false).length/dayTrades.length*100 : 100,
    macroCount: macroTrades.length,
    nonMacroCount: nonMacroTrades.length,
    macroPnl: macroTrades.reduce((s,t)=>s+(t.pnl||0),0),
    nonMacroPnl: nonMacroTrades.reduce((s,t)=>s+(t.pnl||0),0),
    macroWR: macroTrades.length ? macroTrades.filter(t=>(t.pnl||0)>0).length/macroTrades.length*100 : 0,
    macroCounts
  };
  let prepScore = 100;
  const notes = [];
  if(day.htfAlign==='No'){ prepScore -= 20; notes.push('HTF 不一致'); }
  if(day.news==='Yes'){ prepScore -= 15; notes.push('有新闻风险'); }
  if(!day.sessionFocus){ prepScore -= 10; notes.push('未写主做时段'); }
  if(!day.setupFocus){ prepScore -= 10; notes.push('未写主做 setup'); }
  if(!day.bias){ prepScore -= 10; notes.push('未写 Bias'); }
  let execScore = Math.round((stats.followRate*0.45) + ((stats.violations===0?100:40))*0.2 + ((stats.highRisk===0?100:55))*0.15 + ((stats.tradeCount<=((day.maxTrades||account?.rules?.maxTradesPerDay||3))?100:60))*0.2);
  prepScore = Math.max(0,Math.min(100,prepScore));
  const verdict = (stats.violations>0 || stats.highRisk>=2) ? '需要收缩' : (stats.pnl>=0 && execScore>=75 ? '执行尚可' : '中性观察');
  return {prepScore,execScore,verdict,notes,stats};
}

function buildJournalSuggestions(day, account){
  const dayTrades = S.trades
    .filter(t=>t.date===day.date && (!account || t.aid===account.id))
    .sort((a,b)=>(a.pnl||0)-(b.pnl||0));
  const maxTrades = day.maxTrades || account?.rules?.maxTradesPerDay || 3;
  const best = [...dayTrades].sort((a,b)=>(b.pnl||0)-(a.pnl||0))[0];
  const worst = dayTrades[0];
  const highRiskTrades = dayTrades.filter(t=>t.riskLabel==='high');
  const revengeTrades = dayTrades.filter(t=>t.revenge);
  const fomoTrades = dayTrades.filter(t=>t.fomo);
  const noPlanTrades = dayTrades.filter(t=>t.followPlan===false);
  const slBadTrades = dayTrades.filter(t=>t.stopLossRespected===false);
  const pnl = dayTrades.reduce((s,t)=>s+(t.pnl||0),0);
  let mistakeTag = '';
  if(dayTrades.length > maxTrades) mistakeTag = 'Overtrading';
  else if(revengeTrades.length) mistakeTag = 'Revenge';
  else if(fomoTrades.length) mistakeTag = 'FOMO';
  else if(noPlanTrades.length) mistakeTag = 'No Plan';
  else if(highRiskTrades.length || slBadTrades.length) mistakeTag = 'Risk Too High';

  let mood = '';
  if(dayTrades.length===0) mood = '平静 / 无交易';
  else if(pnl > 0 && !revengeTrades.length && !fomoTrades.length && !noPlanTrades.length) mood = '稳定 / 纪律较好';
  else if(revengeTrades.length || fomoTrades.length) mood = '急躁 / 有情绪波动';
  else if(pnl < 0) mood = '一般 / 需收缩';
  else mood = '中性 / 可继续观察';

  const fmtTrade = (t, fallback='') => t ? `${t.time||'--:--'} ${t.sym||''} ${t.dir||''} ${$m(t.pnl||0)}`.trim() : fallback;
  const bestTrade = best ? fmtTrade(best) : '';
  const worstTrade = dayTrades.length<=1 ? (dayTrades.length===1 ? '仅有这一笔' : '') : fmtTrade(worst);

  const highlights = [];
  const cautions = [];
  const nextActions = [];
  if(dayTrades.length===0){
    highlights.push('今天没有出手，空仓本身也是纪律的一部分。');
    if(day.notesPre) highlights.push('盘前计划已经写下，这说明你在做有准备的等待。');
    nextActions.push('明天继续先写计划，再决定是否出手');
    nextActions.push('只在主做时段里等待熟悉 setup');
  } else {
    highlights.push(`今天共 ${dayTrades.length} 笔，净值 ${$m(pnl)}。`);
    if(best) highlights.push(`最好的一笔是 ${best.sym||''} ${best.dir||''}，说明你的 edge 依然有效。`);
    if(dayTrades.length <= maxTrades && !revengeTrades.length && !fomoTrades.length && !noPlanTrades.length) {
      highlights.push('交易数量和纪律都基本在计划内。');
    }
    if(dayTrades.length > maxTrades) cautions.push(`交易笔数超过计划上限 ${maxTrades}，已经有明显 overtrading 倾向。`);
    if(revengeTrades.length) cautions.push(`检测到 ${revengeTrades.length} 笔报复性交易，亏损后再入场的冲动仍然存在。`);
    if(fomoTrades.length) cautions.push(`检测到 ${fomoTrades.length} 笔 FOMO 追单，说明等待确认还不够。`);
    if(noPlanTrades.length) cautions.push(`有 ${noPlanTrades.length} 笔偏离盘前计划，说明你需要更严格执行 checklist。`);
    if(highRiskTrades.length) cautions.push(`高风险单 ${highRiskTrades.length} 笔，说明风险过滤还不够硬。`);
    if(slBadTrades.length) cautions.push(`有 ${slBadTrades.length} 笔止损纪律异常，说明出场执行还有松动。`);
    if(worst && dayTrades.length>1) cautions.push(`最差的一笔是 ${worst.sym||''} ${worst.dir||''}，优先复盘它为什么被触发。`);

    if(revengeTrades.length || fomoTrades.length) nextActions.push('下个交易日只允许 A / A+ setup，第一笔亏损后强制冷静');
    if(dayTrades.length > maxTrades) nextActions.push('把日内最大笔数锁回计划值，不再临时加单');
    if(highRiskTrades.length) nextActions.push('明天把单笔风险降一级，先恢复执行质量');
    if(!nextActions.length) nextActions.push('保持当前节奏，继续把好 setup 做得更标准');
  }

  let coachComment = '';
  if(dayTrades.length===0){
    coachComment = '今天没有交易，不代表今天没有价值。真正职业的节奏不是每天都必须出手，而是每天都能守住自己的边界。只要盘前计划清楚、盘中没有乱动，今天依然算合格。';
  } else if((revengeTrades.length || fomoTrades.length || dayTrades.length > maxTrades) && pnl >= 0){
    coachComment = '今天虽然结果是赚钱的，但过程并不干净。你需要警惕“盈利掩盖错误”这件事——如果今天允许 FOMO、过度交易或情绪化加单存在，下一次市场不给运气时，回撤会很快放大。';
  } else if(pnl < 0 && (revengeTrades.length || fomoTrades.length || highRiskTrades.length)){
    coachComment = '今天的问题更偏执行，而不是单纯技术。亏损本身并不可怕，可怕的是在状态变差时还继续加速。你需要把重点放回到“减少无效出手、缩小风险、恢复等待”上。';
  } else if(pnl > 0 && !revengeTrades.length && !fomoTrades.length && !noPlanTrades.length){
    coachComment = '今天更像一名交易员，而不是一名赌徒。利润来自相对干净的执行，这种日子最值得复制。不要急着放大风险，先把这种“按计划拿利润”的样子稳定下来。';
  } else {
    coachComment = '今天属于中性样本，既有可保留的部分，也有需要修的细节。你的目标不是把每一天都做成大赚，而是让错误越来越少，让高质量交易越来越稳定。';
  }

  let review = [...highlights, ...cautions].join(' ');
  if(review.length > 260) review = review.slice(0,260) + '…';

  return {
    mood,
    bestTrade,
    worstTrade,
    mistakeTag,
    missedTrade: day.missedTrade || 'No',
    review,
    coachComment,
    nextActions
  };
}



// ════ COMPLIANCE ENGINE ════
const CE={
  analyze(trade,account,allTrades){
    const violations=[],suspected=[];
    const r=account.rules||{};
    const tDate=trade.date,tTime=trade.time||'12:00';
    const contracts=parseInt(trade.c)||1;
    const tKey=tDate+(tTime||'');
    const acTrades=allTrades.filter(t=>t.aid===account.id&&t.id!==trade.id)
      .sort((a,b)=>(a.date+(a.time||''))<(b.date+(b.time||''))?-1:1);
    const priorToday=acTrades.filter(t=>t.date===tDate);
    const priorPnlToday=priorToday.reduce((s,t)=>s+(t.pnl||0),0);
    const lotTier=account.lotTier||0;
    const startBal=account.start||0;
    const priorPnlAll=acTrades.reduce((s,t)=>s+(t.pnl||0),0);
    const runBal=startBal+priorPnlAll;
    const runDD=Math.max(0,startBal-runBal);

    // Hard violations
    if(lotTier>0&&symToMNQ(trade.sym||'',contracts)>lotTier){
      violations.push({code:'LOT',reason:`手数 ${contracts} 合约超账户上限 ${lotTier} MNQ`});
    }
    if(r.daily>0&&priorPnlToday<-r.daily){
      violations.push({code:'DAILY_LIMIT',reason:`开单前日亏已达 ${$m(Math.abs(priorPnlToday))}，超过日亏上限 ${$m(r.daily)}，不得继续`});
    }
    if(r.maxTradesPerDay>0&&priorToday.length>=r.maxTradesPerDay){
      violations.push({code:'MAX_TRADES',reason:`今日已交易 ${priorToday.length} 笔，已超最大笔数 ${r.maxTradesPerDay}`});
    }
    if(account.status==='disabled'){
      violations.push({code:'AC_DISABLED',reason:'账户已被禁用，不允许继续开仓'});
    }
    if(r.maxDD>0&&runDD>=(r.maxDD)){
      violations.push({code:'MAX_DD',reason:`账户回撤已达 ${$m(runDD)}，超过最大回撤上限 ${$m(r.maxDD)}`});
    }
    if(account.role==='aggressive'&&r.daily>0){
      const usagePct=priorPnlToday<0?Math.abs(priorPnlToday)/r.daily*100:0;
      if(usagePct>=80)violations.push({code:'AGG_CRITICAL',reason:`激进账户日亏使用率 ${usagePct.toFixed(0)}%（≥80%），已进入禁用阈值`});
    }

    // Suspected violations
    const recentAc=[...acTrades].sort((a,b)=>(a.date+(a.time||''))>(b.date+(b.time||''))?-1:1);
    const lastTrade=recentAc[0];
    if(lastTrade&&lastTrade.pnl<-150&&lastTrade.date===tDate&&trade.time&&lastTrade.time){
      const mDiff=(parseInt(trade.time)*60+parseInt((trade.time.split(':')[1]||0)))-(parseInt(lastTrade.time)*60+parseInt((lastTrade.time.split(':')[1]||0)));
      if(mDiff>=0&&mDiff<60){const conf=mDiff<15?85:mDiff<30?70:60;suspected.push({code:'REVENGE',reason:`上笔亏损 ${$m(Math.abs(lastTrade.pnl))} 后仅 ${mDiff} 分钟再次开仓，疑似报复单`,confidence:conf});}
    }
    const avgRisk=acTrades.length>=3?acTrades.reduce((s,t)=>s+(t.risk||0),0)/acTrades.length:0;
    if(avgRisk>5&&(trade.risk||0)>avgRisk*2.5){suspected.push({code:'HIGH_RISK',reason:`本笔风险 ${$m(trade.risk||0)} 是历史均值 ${$m(avgRisk,0)} 的 ${((trade.risk||0)/avgRisk).toFixed(1)} 倍`,confidence:68});}
    let consLoss=0;
    for(let i=0;i<Math.min(recentAc.length,6);i++){if(recentAc[i].pnl<0)consLoss++;else break;}
    if(consLoss>=3)suspected.push({code:'CONSEC_LOSS',reason:`账户已连续亏损 ${consLoss} 笔，仍继续开仓`,confidence:Math.min(90,52+consLoss*8)});
    if(account.role==='backup'){
      const otherLoss=allTrades.filter(t=>t.aid!==account.id&&t.date===tDate&&t.pnl<0).reduce((s,t)=>s+Math.abs(t.pnl),0);
      if(otherLoss>400)suspected.push({code:'BACKUP_ABSORB',reason:`今日其他账户亏损 ${$m(otherLoss)}，备用账户疑似承接损失`,confidence:60});
    }
    if(acTrades.length>=3){const avgC=acTrades.reduce((s,t)=>s+(parseInt(t.c)||1),0)/acTrades.length;if(contracts>avgC*2.2&&contracts>1)suspected.push({code:'UNUSUAL_LOT',reason:`本笔 ${contracts} 合约是历史均值 ${avgC.toFixed(1)} 的 ${(contracts/avgC).toFixed(1)} 倍`,confidence:55});}
    const acSwitches=new Set(allTrades.filter(t=>t.date===tDate&&t.id!==trade.id).map(t=>t.aid));
    if(acSwitches.size>=3)suspected.push({code:'AC_SWITCH',reason:`今日已在 ${acSwitches.size} 个账户交易，频繁切换疑似分散损失`,confidence:58});

    const userOverride=trade.compliance?.userOverride||null;
    const rawStatus=violations.length>0?'violation':suspected.length>0?'suspected':'compliant';
    const finalStatus=userOverride||rawStatus;
    const maxConf=violations.length>0?100:suspected.length>0?Math.max(...suspected.map(s=>s.confidence)):100;
    return{
      status:finalStatus,rawStatus,
      violations:violations.map(v=>v.reason),
      suspected:suspected.map(s=>({reason:s.reason,confidence:s.confidence})),
      confidence:maxConf,
      userConfirmed:trade.compliance?.userConfirmed||false,
      userOverride,
    };
  },
  pendingCount(){
    return S.trades.filter(t=>t.compliance&&(t.compliance.status==='suspected'||t.compliance.status==='violation')&&!t.compliance.userConfirmed).length;
  }
};

// ════ RISK PROTECTION ENGINE ════
const RPE={
  calcDanger(account,allTrades){
    if(account.status==='disabled')return'disabled';
    const r=account.rules||{};const today=new Date().toISOString().slice(0,10);
    const acTrades=allTrades.filter(t=>t.aid===account.id);
    const todayPnl=acTrades.filter(t=>t.date===today).reduce((s,t)=>s+(t.pnl||0),0);
    const todayLoss=Math.max(0,-todayPnl);
    const dailyPct=r.daily>0?todayLoss/r.daily*100:0;
    const startBal=account.start||0;
    const totalPnl=acTrades.reduce((s,t)=>s+(t.pnl||0),0);
    const dd=Math.max(0,startBal-(startBal+totalPnl));
    const ddPct=r.maxDD>0?dd/r.maxDD*100:0;
    const maxPct=Math.max(dailyPct,ddPct);
    if(account.role==='aggressive'){if(maxPct>=80)return'critical';if(maxPct>=50)return'danger';if(maxPct>=30)return'warning';}
    else{if(maxPct>=90)return'critical';if(maxPct>=70)return'danger';if(maxPct>=40)return'warning';}
    return'safe';
  },
  check(accounts,allTrades){
    const triggers=[];
    const aggDanger=accounts.filter(ac=>ac.role==='aggressive'&&['danger','critical'].includes(this.calcDanger(ac,allTrades)));
    if(aggDanger.length>0)triggers.push(`激进账户「${aggDanger.map(a=>a.name).join('、')}」已达${this.calcDanger(aggDanger[0],allTrades)==='critical'?'80%':'50%'}日亏阈值`);
    const aggDisabled=accounts.filter(ac=>ac.role==='aggressive'&&ac.status==='disabled');
    if(aggDisabled.length>0)triggers.push(`激进账户「${aggDisabled.map(a=>a.name).join('、')}」已被禁用`);
    const anyCritical=accounts.filter(ac=>ac.role!=='observer'&&this.calcDanger(ac,allTrades)==='critical'&&ac.role!=='aggressive');
    if(anyCritical.length>0)triggers.push(`账户「${anyCritical.map(a=>a.name).join('、')}」处于极度危险状态`);
    const today=new Date().toISOString().slice(0,10);
    const totalLoss=allTrades.filter(t=>t.date===today&&t.pnl<0&&accounts.find(a=>a.id===t.aid&&a.role!=='observer')).reduce((s,t)=>s+Math.abs(t.pnl),0);
    const totalLimit=accounts.filter(a=>a.role!=='observer').reduce((s,ac)=>s+(ac.rules?.daily||0),0);
    const globalPct=totalLimit>0?totalLoss/totalLimit*100:0;
    if(globalPct>=70)triggers.push(`全局日亏风险使用率 ${globalPct.toFixed(0)}%，超过警戒值`);
    const isActive=triggers.length>0;
    const isCritical=aggDanger.some(a=>this.calcDanger(a,allTrades)==='critical')||aggDisabled.length>0||globalPct>=90;
    return{isActive,isCritical,triggers,globalPct,message:isCritical?'不建议继续交易':'仅允许低风险执行'};
  }
};

// ════ SMART HINTS ════
function checkSmartHints(pnl,rv,fo){
  const ac=ga();if(!ac)return[];
  const hints=[];const tr=gtr(ac.id);
  let streak=0;tr.slice(-3).forEach(t=>{if(t.pnl<0)streak++;else streak=0;});
  if(streak>=2&&pnl<0)hints.push(`⚠ 已连续亏损 ${streak} 笔，本笔如亏损将达 ${streak+1} 连亏 — 是否停手？`);
  const today=new Date().toISOString().slice(0,10);
  const todayCount=tr.filter(t=>t.date===today).length;
  if(todayCount>=3)hints.push(`⚠ 今日已交易 ${todayCount} 笔，注意纪律上限`);
  const todayPnl=tr.filter(t=>t.date===today).reduce((s,t)=>s+t.pnl,0);
  if(ac.rules?.daily&&todayPnl<0&&Math.abs(todayPnl)/ac.rules.daily>0.6)hints.push(`⚠ 今日已亏 ${$m(Math.abs(todayPnl))}，已用日亏限制 ${$p(Math.abs(todayPnl)/ac.rules.daily*100)}`);
  const prot=RPE.check(S.accounts,S.trades);
  if(prot.isActive&&ac.role==='aggressive')hints.push(`🛡 风险保护模式激活：激进账户建议停止交易`);
  if(prot.isActive&&ac.role==='backup')hints.push(`🛡 风险保护模式：备用账户禁止承接正式风险`);
  return hints;
}

      <div class="mc"><div class="lbl">当前动作</div><div class="val" style="font-size:18px;color:${guard.status==='blocked'?'var(--red)':guard.status==='caution'?'var(--amber)':'var(--green)'}">${guard.status==='blocked'?'停止':guard.status==='caution'?'缩仓': '继续'}</div><div class="s">${guard.message||'状态正常'}</div></div>
    </div>

      </div>
    </div>
    ${engine.reasons.length?`<ul class="engine-reasons">${engine.reasons.slice(0,5).map(r=>`<li>${esc(r)}</li>`).join('')}</ul>`:`<div class="small-note">当前未发现明显执行风险，可按计划执行。</div>`}

<div class="page-title">${esc(ac.name)} ${phBadge}</div>
<div class="page-sub">${esc(ac.broker||'')}${ac.broker?' · ':''}账户规模 ${$m(ac.start||0)}</div>
<div class="g4">

  <div class="mc"><div class="lbl">交易盈亏</div><div class="val" style="color:${pnlC(s.total)}">${$m(s.total)}</div><div class="s">未扣费用</div></div>
  <div class="mc"><div class="lbl">总投入费用</div><div class="val amb">${$m(s.feeTotal)}</div><div class="s">报名+激活+其他</div></div>
  <div class="mc"><div class="lbl">扣费后净值</div><div class="val" style="color:${pnlC(s.netAfterFees)}">${$m(s.netAfterFees)}</div><div class="s">真实现金视角</div></div>
  <div class="mc"><div class="lbl">已用回撤</div><div class="val" style="color:${riskC(pD)}">${$m(s.ddU)}</div><div class="s">限制 ${$m(r.maxDD||0)}</div></div>
  <div class="mc"><div class="lbl">交易天数</div><div class="val">${s.days}</div><div class="s">${r.minDays>0?'最少 '+r.minDays+' 天':'无要求'}</div></div>
  <div class="mc"><div class="lbl">纪律评分</div><div class="val" style="color:${s.execScore>=85?'var(--green)':s.execScore>=70?'var(--amber)':'var(--red)'}">${s.execScore.toFixed(0)}</div><div class="s">100分制</div></div>
  <div class="mc"><div class="lbl">今日 P&L</div><div class="val" style="color:${pnlC(s.todayPnl)}">${$m(s.todayPnl)}</div><div class="s">${r.daily>0?'日限 '+$m(r.daily):'无限制'}</div></div>
</div>
${r.target>0?`<div class="card"><div class="card-title">盈利目标 ${$p(pT)}</div><div class="pbar-lg"><div class="pbar-lg-f" style="width:${pT}%;background:var(--green);"></div></div><div style="font-size:11px;color:var(--muted2);margin-top:5px;">${$m(Math.max(0,s.total))} / ${$m(r.target)} · 还需 ${$m(Math.max(0,r.target-s.total))}</div></div>`:''}

<div class="card"><div class="card-title">权益曲线</div><div style="position:relative;height:200px;"><canvas id="ec-c"></canvas></div></div>`;

function renderTrades(){
  const ac=ga();
  const base=S.trades.filter(t=>S.tradeFilter==='all_accounts'?true:t.aid===(ac?.id)).sort((a,b)=>(a.date+(a.time||''))>(b.date+(b.time||''))?-1:1);
  const searched=base.filter(t=>{
    const txt=(S.tradeSearch||'').trim().toLowerCase();
    if(txt){
      const hay=[t.sym,t.dir,t.setup,t.session,t.note,t.shouldTradeReason,t.tradeQuality].join(' ').toLowerCase();
      if(!hay.includes(txt)) return false;
    }
    if(S.tradeSession!=='all' && (t.session||'')!==S.tradeSession) return false;
    if(S.tradeSetup!=='all' && (t.setup||'')!==S.tradeSetup) return false;
    if(S.tradeQuality!=='all' && (t.tradeQuality||'')!==S.tradeQuality) return false;
    if(S.tradeShould!=='all' && (t.shouldTrade||'yes')!==S.tradeShould) return false;
    if(S.tradeMacro && S.tradeMacro!=='all'){
      const mw = t.macroWindow || autoMacro(t.date,t.time||'');
      if(S.tradeMacro==='_any'){ if(!mw) return false; }
      else if(S.tradeMacro==='_none'){ if(mw) return false; }
      else if(mw !== S.tradeMacro) return false;
    }
    if(S.tradeDateFrom && (t.date||'')<S.tradeDateFrom) return false;
    if(S.tradeDateTo && (t.date||'')>S.tradeDateTo) return false;
    return true;
  });
  const byFilter={all:searched,compliant:searched.filter(t=>!t.compliance||t.compliance.status==='compliant'),suspected:searched.filter(t=>t.compliance?.status==='suspected'),violation:searched.filter(t=>t.compliance?.status==='violation')};
  const shown=byFilter[S.tradeFilter]||searched;

  document.getElementById('page-content').innerHTML=`
<div class="section-hd">
  <div><div class="page-title">交易记录</div><div class="page-sub">${S.tradeFilter==='all_accounts'?'全部账户':esc(ac?.name||'')} · ${shown.length} 条</div></div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;">
    <button class="btn-sm ${S.tradeFilter==='all_accounts'?'btn-primary':''}" onclick="S.tradeFilter='all_accounts';renderTrades()">全部账户</button>
    <button class="btn-sm btn-primary" onclick="openDrawer('trade')">+ 添加</button>
  </div>
</div>
<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
  ${['all','compliant','suspected','violation'].map(f=>`<button class="filter-btn ${S.tradeFilter===f?'active':''}" onclick="S.tradeFilter='${f}';renderTrades()">
    ${f==='all'?'全部':f==='compliant'?'✅ 合规':f==='suspected'?'⚠ 疑似':'🚫 违规'} (${byFilter[f]?.length||0})</button>`).join('')}
</div>
<div class="card" style="margin-bottom:12px;">
  <div class="card-title">高级筛选</div>
  <div class="form-row t3">
    <div class="fg"><label>搜索</label><input value="${esc(S.tradeSearch||'')}" placeholder="品种 / 备注 / 原因" oninput="S.tradeSearch=this.value;renderTrades()"></div>
    <div class="fg"><label>Session</label><select onchange="S.tradeSession=this.value;renderTrades()"><option value="all" ${S.tradeSession==='all'?'selected':''}>全部</option><option ${S.tradeSession==='NY AM'?'selected':''}>NY AM</option><option ${S.tradeSession==='NY Lunch'?'selected':''}>NY Lunch</option><option ${S.tradeSession==='NY PM'?'selected':''}>NY PM</option><option ${S.tradeSession==='London'?'selected':''}>London</option><option ${S.tradeSession==='Asia'?'selected':''}>Asia</option><option ${S.tradeSession==='Other'?'selected':''}>Other</option></select></div>
    <div class="fg"><label>Setup</label><select onchange="S.tradeSetup=this.value;renderTrades()"><option value="all" ${S.tradeSetup==='all'?'selected':''}>全部</option><option ${S.tradeSetup==='A+'?'selected':''}>A+</option><option ${S.tradeSetup==='A'?'selected':''}>A</option><option ${S.tradeSetup==='B'?'selected':''}>B</option><option ${S.tradeSetup==='C'?'selected':''}>C</option></select></div>
  </div>
  <div class="form-row t3">
    <div class="fg"><label>Trade Quality</label><select onchange="S.tradeQuality=this.value;renderTrades()"><option value="all" ${S.tradeQuality==='all'?'selected':''}>全部</option><option ${S.tradeQuality==='A'?'selected':''}>A</option><option ${S.tradeQuality==='B'?'selected':''}>B</option><option ${S.tradeQuality==='C'?'selected':''}>C</option></select></div>
    <div class="fg"><label>Should Trade</label><select onchange="S.tradeShould=this.value;renderTrades()"><option value="all" ${S.tradeShould==='all'?'selected':''}>全部</option><option value="yes" ${(S.tradeShould||'')==='yes'?'selected':''}>Yes</option><option value="no" ${(S.tradeShould||'')==='no'?'selected':''}>No</option></select></div>
    <div class="fg"><label>Macro 时段</label><select onchange="S.tradeMacro=this.value;renderTrades()">
      <option value="all" ${(!S.tradeMacro||S.tradeMacro==='all')?'selected':''}>全部</option>
      <option value="_any" ${S.tradeMacro==='_any'?'selected':''}>✓ 任意 Macro 内</option>
      <option value="_none" ${S.tradeMacro==='_none'?'selected':''}>✗ 非 Macro</option>
      ${TIME_ENGINE.settings.macros.filter(m=>m.enabled!==false).map(m=>`<option value="${esc(m.name)}" ${S.tradeMacro===m.name?'selected':''}>${esc(m.name)}</option>`).join('')}
    </select></div>
  </div>
  <div class="form-row t3">
    <div class="fg"><label>日期范围</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><input type="date" value="${S.tradeDateFrom||''}" onchange="S.tradeDateFrom=this.value;renderTrades()"><input type="date" value="${S.tradeDateTo||''}" onchange="S.tradeDateTo=this.value;renderTrades()"></div></div>
  </div>
</div>
${shown.length===0?`<div class="empty">暂无交易记录</div>`:`
<div class="tbl-wrap"><table>
<thead><tr><th>日期/时间 (NY)</th><th>账户</th><th>品种</th><th>方向</th><th>手数</th><th>Session</th><th>Macro</th><th>Setup</th><th>质量</th><th>风险</th><th style="text-align:right">盈亏</th><th>合规</th><th></th></tr></thead>
<tbody>${shown.map(t=>{
  const acN=S.accounts.find(a=>a.id===t.aid)?.name||'—';
  const cs=t.compliance?.status||'compliant';
  const userC=t.compliance?.userConfirmed;
  const mw = t.macroWindow || autoMacro(t.date,t.time||'');
  const sess = t.session || autoSession(t.date,t.time||'');
  const nyT = nyDisplay(t.date,t.time||'');
  return `<tr>
    <td class="mono" style="font-size:11px;color:var(--muted);">${esc(t.date)}<br>${t.time?`<span style="font-size:10px;">${esc(t.time)}</span>`:''}${nyT?`<br><span style="font-size:9px;color:var(--accent);">${esc(nyT)}</span>`:''}</td>
    <td style="font-size:11px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(acN)}</td>
    <td style="font-weight:700;">${esc(t.sym||'—')}</td>
    <td><span class="badge ${t.dir==='Long'?'b-long':'b-short'}">${esc(t.dir||'—')}</span></td>
    <td class="mono">${t.c||1}</td>
    <td><span style="font-size:11px;color:var(--text);">${esc(sess||'—')}</span></td>
    <td>${mw?`<span class="badge b-blue" style="font-size:9px;">${esc(mw)}</span>`:`<span style="color:var(--muted2);font-size:10px;">—</span>`}</td>
    <td><span class="badge ${t.setup==='A+'?'b-good':t.setup==='A'?'b-blue':t.setup==='B'?'b-mid':'b-bad'}">${esc(t.setup||'B')}</span></td>

    <td class="mono" style="font-weight:700;color:${pnlC(t.pnl||0)};text-align:right;">${$m(t.pnl||0)}</td>
    <td><span class="badge b-${cs}">${cs==='violation'?'违规':cs==='suspected'?'疑似':'合规'}</span>${userC&&cs!=='compliant'?'<span style="font-size:9px;color:var(--green);margin-left:3px;">✓</span>':''}</td>
    <td style="display:flex;gap:2px;">

    </td>
  </tr>`;}).join('')}</tbody></table></div>`}`;
}

      [1,2,3,4,5].map(d=>{const v=dowPnl2[d]||0;const pct=Math.abs(v)/mxDow*100;return`<div style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;"><span style="color:${String(d)===String(worstDow2)?'var(--red)':'var(--muted)'}">${dowNames[d]}</span><span class="mono" style="color:${pnlC(v)};font-weight:600;">${$m(v)}</span></div><div style="height:5px;border-radius:3px;background:var(--surface2);overflow:hidden;"><div style="width:${pct}%;height:100%;background:${v>=0?'var(--green)':'var(--red)'};border-radius:3px;transition:width .5s;"></div></div></div>`;}).join('');

      const freqChartOpts=(unit)=>({type:'bar',options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:items=>`${items[0].label} trades/${unit}`,label:item=>`Occurred ${item.parsed.y} time${item.parsed.y!==1?'s':''}`}}},scales:{x:{grid:{color:'rgba(255,255,255,.02)'},ticks:{color:'#5a6070',font:{size:9}},title:{display:true,text:`trades / ${unit}`,color:'#5a6070',font:{size:9}}},y:{grid:{color:'rgba(255,255,255,.03)'},ticks:{color:'#5a6070',font:{size:9},stepSize:1},beginAtZero:true,title:{display:true,text:'# of occurrences',color:'#5a6070',font:{size:9}}}}}});

      // Trades/day distribution
      const dailyCounts=Object.values(s.dailyMap).map(arr=>arr.length);
      const dayFreq={};dailyCounts.forEach(n=>{dayFreq[n]=(dayFreq[n]||0)+1;});
      const dayAvg=dailyCounts.length?+(dailyCounts.reduce((a,b)=>a+b,0)/dailyCounts.length).toFixed(1):0;
      const dayMax=Math.max(...dailyCounts,0);

      // Trades/week distribution
      const weekMap={};
      s.tr.forEach(t=>{const d=new Date(t.date);const wk=d.getFullYear()+'W'+Math.ceil((d-new Date(d.getFullYear(),0,1))/604800000);weekMap[wk]=(weekMap[wk]||0)+1;});
      const weekCounts=Object.values(weekMap);

      const weekAvg=weekCounts.length?+(weekCounts.reduce((a,b)=>a+b,0)/weekCounts.length).toFixed(1):0;
      const weekMax=Math.max(...weekCounts,0);

      const wkCtx=document.getElementById('freq-week-c');

      // Trades/month distribution
      const monthCountMap={};
      s.tr.forEach(t=>{const mo=t.date.slice(0,7);monthCountMap[mo]=(monthCountMap[mo]||0)+1;});
      const monthCounts=Object.values(monthCountMap);
      const monthFreq={};monthCounts.forEach(n=>{monthFreq[n]=(monthFreq[n]||0)+1;});
      const monthAvg=monthCounts.length?+(monthCounts.reduce((a,b)=>a+b,0)/monthCounts.length).toFixed(1):0;
      const monthMax=Math.max(...monthCounts,0);
      const monthLabels=Array.from({length:monthMax+1},(_,i)=>i);
      const monthData=monthLabels.map(n=>monthFreq[n]||0);

      const moCtx=document.getElementById('freq-month-c');

    }

    // ── Expectancy ──
    const expectancy=s.wr*s.aw-(1-s.wr)*s.al;
    const expEl=document.getElementById('expectancy-val');
    if(expEl){expEl.textContent=$m(expectancy);expEl.style.color=expectancy>0?'var(--green)':expectancy<0?'var(--red)':'var(--text)';}
    const winBar=document.getElementById('exp-win-bar'),lossBar=document.getElementById('exp-loss-bar');

    const ewl=document.getElementById('exp-win-label'),ell=document.getElementById('exp-loss-label');

    // ── KPI Dashboard ──

    const kvr=document.getElementById('kpi-violation-rate'),ksr=document.getElementById('kpi-suspected-rate');

            : (Math.abs(diff)<1)
              ? `Macro 内外表现接近（期望值差 ${$m(diff)}）。`

                ? `📈 Macro 时段表现更好，期望值高出 <strong style="color:var(--green)">${$m(diff)}</strong>/笔。`

        }

    if(!window._statsYear)window._statsYear=new Date().getFullYear();

    window.renderTimeChart();
  },50);

    for(let d=1;d<=dInM;d++){

    return`<div class="perf-cal-month">

window.renderTimeChart=function(){

  tr.forEach(t=>{const hr=parseInt((t.time||'00:00').split(':')[0]);if(isNaN(hr))return;if(!hourMap[hr])hourMap[hr]={pnl:0,wins:0,count:0};hourMap[hr].pnl+=t.pnl;hourMap[hr].count++;if(t.pnl>0)hourMap[hr].wins++;});
  const hrs=Array.from({length:24},(_,i)=>i);
  const data=hrs.map(h=>{
    const d=hourMap[h];if(!d)return 0;
    if(metric==='pnl')return+d.pnl.toFixed(0);
    if(metric==='wr')return d.count>0?+(d.wins/d.count*100).toFixed(1):0;
    return d.count;
  });
  const labels=hrs.map(h=>`${String(h).padStart(2,'0')}:00`);

// ── Macro activity card for Trading OS ──
function renderTradingOSMacroCard(todayTrades){
  const nowNY = TIME_ENGINE.nowNY();
  const today = nowNY.dateStr;
  const active = TIME_ENGINE.currentActiveMacro();
  const next = TIME_ENGINE.nextMacroToday();
  // Macro stats across today
  const macroMap = {};
  TIME_ENGINE.settings.macros.forEach(m=>{ macroMap[m.name] = {count:0,pnl:0,trades:[]}; });
  todayTrades.forEach(t=>{
    const mw = t.macroWindow || autoMacro(t.date,t.time||'');
    if(mw && macroMap[mw]){ macroMap[mw].count++; macroMap[mw].pnl += (t.pnl||0); macroMap[mw].trades.push(t); }
  });
  const hit = Object.keys(macroMap).filter(k=>macroMap[k].count>0);
  const fmtHM = hm => `${String(hm[0]).padStart(2,'0')}:${String(hm[1]).padStart(2,'0')}`;
  // Timeline ordered by start time
  const ordered = [...TIME_ENGINE.settings.macros].filter(m=>m.enabled!==false)
    .sort((a,b)=>(a.start[0]*60+a.start[1])-(b.start[0]*60+b.start[1]));
  const rows = ordered.map(m=>{
    const data = macroMap[m.name] || {count:0,pnl:0};
    const startM = m.start[0]*60+m.start[1];
    const endM = m.end[0]*60+m.end[1];
    const isActive = nowNY.totalMinutes >= startM && nowNY.totalMinutes < endM;
    const isPast = nowNY.totalMinutes >= endM;
    const icon = isActive ? '🟢' : isPast ? '✓' : '○';
    const status = isActive?'ACTIVE':isPast?'Past':'Upcoming';
    const rowColor = isActive ? 'rgba(43,171,133,.08)' : '';
    return `<tr style="background:${rowColor};">
      <td style="padding:5px 8px;font-size:14px;">${icon}</td>
      <td style="padding:5px 8px;font-weight:600;font-size:12px;">${esc(m.name)}</td>
      <td style="padding:5px 8px;" class="mono">${fmtHM(m.start)}–${fmtHM(m.end)}</td>
      <td style="padding:5px 8px;font-size:10px;color:var(--muted);">${status}</td>
      <td style="padding:5px 8px;text-align:center;">${data.count || '—'}</td>
      <td style="padding:5px 8px;text-align:right;" class="mono" ${data.count?`style="color:${pnlC(data.pnl)};font-weight:700;"`:'style="color:var(--muted2);"'}>${data.count?$m(data.pnl):'—'}</td>
    </tr>`;
  }).join('');

  return `<div class="card">
    <div class="card-title">🎯 8. Today's ICT Macro Activity</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;">
      <div class="mc" style="flex:1;min-width:160px;">
        <div class="lbl">当前时段</div>
        <div class="val" style="color:${active?'var(--green)':'var(--muted)'};">${active || (next?`下一个: ${next.macro.name}`:'—')}</div>
        <div class="s">NY ${esc(nowNY.timeStr)} · ${hit.length} 个 Macro 已参与</div>
      </div>
      <div class="mc" style="flex:1;min-width:160px;">
        <div class="lbl">Macro 内交易</div>
        <div class="val" style="color:${hit.length?'var(--accent)':'var(--muted)'};">${hit.reduce((s,k)=>s+macroMap[k].count,0)} 笔</div>
        <div class="s">${hit.join(' · ')||'今日未在 Macro 内交易'}</div>
      </div>
      <div class="mc" style="flex:1;min-width:160px;">
        <div class="lbl">Macro 内净值</div>
        <div class="val" style="color:${pnlC(hit.reduce((s,k)=>s+macroMap[k].pnl,0))};">${$m(hit.reduce((s,k)=>s+macroMap[k].pnl,0))}</div>
        <div class="s">所有 Macro 时段合计</div>
      </div>
    </div>
    <div style="overflow-x:auto;"><table style="width:100%;font-size:12px;">
      <thead><tr style="color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em;">
        <th style="text-align:left;padding:5px 8px;"></th>
        <th style="text-align:left;padding:5px 8px;">Macro</th>
        <th style="text-align:left;padding:5px 8px;">时间 (NY)</th>
        <th style="text-align:left;padding:5px 8px;">状态</th>
        <th style="text-align:center;padding:5px 8px;">笔数</th>
        <th style="text-align:right;padding:5px 8px;">P&L</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="small-note" style="margin-top:8px;">提示：不在 Macro 窗口内的交易通常噪音更大。重点观察 Macro 窗口内的胜率与期望值，参见"统计分析 → Performance by ICT Macro"。</div>
  </div>`;
}

// ── Market Calendar card for Trading OS (rebuilt) ──
// Layout:
//   1. Toolbar       - Filter button (popup like image 2), View tabs, Refresh, +Manual
//   2. Weekly banner - color-coded headline + concrete weekly trading advice
//   3. 5-day strip   - clickable per-day risk cards, the weekly verdict drilled down
//   4. Detail panel  - shows either "Weekly top events" or a single day's full events
//                      styled like the ForexFactory calendar table (image 1)
function renderTradingOSMarketCard(){
  // "Today" in the user's chosen display timezone (defaults to browser local).
  // This is what drives "TODAY" label, week boundary alignment, and default selection.
  const dispTZ = MKT_CAL.getDisplayTZ();
  const nowDisp = MKT_CAL._wallClockInTZ(Date.now(), dispTZ);
  const today = `${nowDisp.year}-${String(nowDisp.month).padStart(2,'0')}-${String(nowDisp.day).padStart(2,'0')}`;
  // Apply user filters before doing anything else
  const filtered = MKT_CAL.applyFilters(S.marketEvents);
  const weekly   = MKT_CAL.weeklyAnalysis(filtered);
  const todaySummary = MKT_CAL.dayRiskSummary(today, filtered);
  const loading = S.mktEventsLoading;
  const errLine = S.mktEventsError ? `<div style="font-size:11px;color:var(--red);margin-bottom:8px;">⚠ ${esc(S.mktEventsError)}。点击"刷新"重试或"手动添加"录入关键事件。</div>` : '';
  const sourceFF = S.marketEvents.filter(e=>e.source==='forexfactory').length;
  const sourceManual = S.marketEvents.filter(e=>e.source==='manual'||e.source==='jin10').length;
  const filteredOut = S.marketEvents.length - filtered.length;
  // Selected day for detail panel
  if(!S.mktSelectedDate || !weekly.weekDays.includes(S.mktSelectedDate)) S.mktSelectedDate = today;
  const detailDate = S.mktSelectedDate;
  const detailItems = filtered
    .filter(e=>e.date===detailDate)
    .sort((a,b)=> (a.utcMs && b.utcMs) ? (a.utcMs - b.utcMs)
                : (a.timeNY||'99:99').localeCompare(b.timeNY||'99:99'));

  // ── Weekly banner ──
  const weekColor = weekly.weekLevel==='danger' ? 'var(--red)'
                  : weekly.weekLevel==='caution' ? 'var(--amber)'
                  : 'var(--green)';
  const weekBg = weekly.weekLevel==='danger' ? 'rgba(232,85,85,.07)'
               : weekly.weekLevel==='caution' ? 'rgba(232,160,32,.06)'
               : 'rgba(43,171,133,.05)';
  const weekBorder = weekly.weekLevel==='danger' ? 'rgba(232,85,85,.35)'
                   : weekly.weekLevel==='caution' ? 'rgba(232,160,32,.3)'
                   : 'rgba(43,171,133,.25)';

  const top3HTML = weekly.top3.length ? weekly.top3.map(e=>{
    const dn = new Date(e.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(255,255,255,.02);border-radius:4px;font-size:11px;border-left:2px solid ${e.risk>=70?'var(--red)':'var(--amber)'};">
      <span class="badge ${e.risk>=70?'b-bad':'b-mid'}" style="font-size:9px;">R${e.risk}</span>
      <span class="mono" style="color:var(--muted);">${esc(dn)} ${esc(e.timeNY||'--:--')}</span>
      <span style="font-size:10px;color:var(--muted);">${esc(e.country||'')}</span>
      <span style="font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;">${esc(e.title)}</span>
    </div>`;
  }).join('') : '<div style="font-size:11px;color:var(--muted2);padding:6px 10px;">本周无明显高风险事件</div>';

  // ── 5-day strip (use weekDays = Mon-Sun based on FF date) ──
  // Use only weekday Mon-Fri since markets closed Sat/Sun in our scope
  const stripDays = weekly.weekDays.filter(d=>{
    const dt = new Date(d+'T12:00:00');
    const wd = dt.getUTCDay();
    return wd>=1 && wd<=5;
  });
  const stripHTML = stripDays.map(d=>{
    const day = weekly.perDay.find(p=>p.dateStr===d) || {summary:{count:0,maxRisk:0},reds:[],oranges:[],speeches:[],level:'safe',advice:''};
    const dn = new Date(d+'T12:00:00');
    const dayName = dn.toLocaleDateString('en-US',{weekday:'short'});
    const dayDate = dn.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const lvlColor = day.level==='danger'?'var(--red)':day.level==='caution'?'var(--amber)':'var(--green)';
    const lvlBg    = day.level==='danger'?'rgba(232,85,85,.07)':day.level==='caution'?'rgba(232,160,32,.06)':'rgba(43,171,133,.04)';
    const lvlBorder= day.level==='danger'?'rgba(232,85,85,.35)':day.level==='caution'?'rgba(232,160,32,.3)':'rgba(74,158,240,.18)';
    const isSelected = d===detailDate;
    const isToday = d===today;
    const selRing = isSelected ? `box-shadow:0 0 0 2px var(--accent) inset;` : '';
    return `<div onclick="MKT_selectDay('${d}')" style="cursor:pointer;border:1px solid ${lvlBorder};${selRing}border-radius:6px;background:${lvlBg};padding:10px;display:flex;flex-direction:column;gap:6px;transition:background .12s;" onmouseover="this.style.background='${lvlBg.replace(/0\.0\d/,'.12')}'" onmouseout="this.style.background='${lvlBg}'">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--text);">${esc(dayName)}</div>
          <div style="font-size:10px;color:var(--muted);">${esc(dayDate)}</div>
        </div>
        ${isToday?'<span class="badge b-good" style="font-size:9px;">TODAY</span>':''}
      </div>
      <div style="display:flex;gap:4px;align-items:center;">
        ${day.reds.length?`<span class="badge b-bad" style="font-size:9px;">🔴${day.reds.length}</span>`:''}
        ${day.oranges.length?`<span class="badge b-mid" style="font-size:9px;">🟠${day.oranges.length}</span>`:''}
        ${day.speeches.length?`<span class="badge b-blue" style="font-size:9px;">🎤${day.speeches.length}</span>`:''}
        ${(!day.reds.length && !day.oranges.length && !day.speeches.length)?`<span style="font-size:10px;color:var(--muted2);">无重要事件</span>`:''}
      </div>
      <div style="font-size:10px;color:${lvlColor};line-height:1.4;font-weight:600;">${day.level==='danger'?'高风险':day.level==='caution'?'中等风险':'低风险'}</div>
    </div>`;
  }).join('');

  // ── Detail rows (FF / image 1 style: date | time | currency | impact-icon | event | actual | forecast | previous) ──
  const detailRows = detailItems.length ? detailItems.map(e=>{
    const risk = MKT_CAL.eventRisk(e);
    const isHigh = (e.impact||'').toLowerCase()==='high';
    const isMed  = (e.impact||'').toLowerCase()==='medium';
    const isHoliday = (e.impact||'').toLowerCase()==='holiday';
    const sp = MKT_CAL.isSpeech(e);
    const impIcon = isHigh ? '<span style="display:inline-block;width:14px;height:11px;background:#cc3a3a;border-radius:2px;" title="High impact"></span>'
                  : isMed ? '<span style="display:inline-block;width:14px;height:11px;background:#e8a020;border-radius:2px;" title="Medium impact"></span>'
                  : isHoliday ? '<span style="font-size:11px;" title="Holiday">🏖</span>'
                  : '<span style="display:inline-block;width:14px;height:11px;background:#5a6070;border-radius:2px;opacity:.5;" title="Low impact"></span>';
    const titleColor = isHigh ? 'var(--red)' : isMed ? 'var(--amber)' : 'var(--text)';
    return `<tr ${isHigh?'style="background:rgba(232,85,85,.04);"':isMed?'style="background:rgba(232,160,32,.03);"':''}>
      <td class="mono" style="font-size:11px;color:var(--muted);width:60px;">${esc(e.timeNY||'all-day')}</td>
      <td style="font-size:11px;color:var(--text);font-weight:700;width:50px;">${esc(e.country||'')}</td>
      <td style="width:24px;text-align:center;">${impIcon}</td>

        ${esc(e.title)}
        ${sp?'<span class="badge b-blue" style="font-size:9px;margin-left:6px;">🎤 SPEECH</span>':''}
        ${(e.eventType && e.eventType!=='Misc')?`<span class="badge" style="font-size:9px;background:rgba(74,158,240,.1);color:#94c2ed;border:1px solid rgba(74,158,240,.2);margin-left:4px;">${esc(e.eventType)}</span>`:''}
      </td>
      <td class="mono" style="font-size:11px;color:var(--muted);text-align:right;width:70px;">${esc(e.actual||'—')}</td>
      <td class="mono" style="font-size:11px;color:var(--muted);text-align:right;width:70px;">${esc(e.forecast||'—')}</td>
      <td class="mono" style="font-size:11px;color:var(--muted);text-align:right;width:70px;">${esc(e.previous||'—')}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="7" style="padding:18px 10px;color:var(--muted2);text-align:center;">所选日期无事件 — 试试调整筛选条件或刷新数据</td></tr>`;

  const dnDetail = new Date(detailDate+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  const detailDayObj = weekly.perDay.find(p=>p.dateStr===detailDate);
  const detailLevel = detailDayObj?.level || 'safe';
  const detailLevelColor = detailLevel==='danger'?'var(--red)':detailLevel==='caution'?'var(--amber)':'var(--green)';
  const detailAdvice = detailDayObj?.advice || '该日无具体建议';

  // ── Active filter badge ──
  const f = S.mktFilter;
  const filterActive = (f.impacts.length<4) || (f.currencies.length<9) || (f.types.length<10) || (f.search&&f.search.length>0);

  return `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
      <div>
        <div class="card-title" style="margin:0;">📅 9. Economic Events &amp; Weekly Risk</div>
        <div style="font-size:10px;color:var(--muted);margin-top:4px;">本周风险扫描 + 红/橙事件自动分析 → 下发到每天的具体建议</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
        <button class="btn-sm ${filterActive?'btn-primary':''}" onclick="MKT_toggleFilterPanel()" title="筛选事件">
          🔽 筛选 ${filterActive?`<span style="background:rgba(255,255,255,.18);padding:0 5px;border-radius:8px;font-size:9px;margin-left:3px;">ON</span>`:''}
        </button>
        ${filteredOut>0?`<span style="font-size:10px;color:var(--muted);">已隐藏 ${filteredOut} 条</span>`:''}
        <span class="badge b-blue">${filtered.length} 事件</span>
        ${loading?'<span style="font-size:11px;color:var(--amber);">抓取中...</span>':''}
        <button class="btn-sm" onclick="MKT_refresh(true)">🔄 刷新</button>
        <button class="btn-sm" onclick="openEventDrawer()">+ 手动</button>
      </div>
    </div>
    ${errLine}
    ${S.mktFilter.filterPanelOpen ? renderMktFilterPanel() : ''}

    <!-- Weekly Banner -->
    <div style="background:${weekBg};border:1px solid ${weekBorder};border-left:4px solid ${weekColor};border-radius:6px;padding:14px;margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px;">
        <div>
          <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">本周风险评估</div>
          <div style="font-size:16px;font-weight:700;color:${weekColor};margin-bottom:6px;">${esc(weekly.headline)}</div>
          <div style="font-size:11px;color:var(--text);line-height:1.6;max-width:680px;">${esc(weekly.weekAdvice)}</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <div class="mc" style="min-width:70px;padding:8px;"><div class="lbl">红色</div><div class="val" style="font-size:18px;color:${weekly.counts.red>=3?'var(--red)':'var(--text)'};">${weekly.counts.red}</div></div>
          <div class="mc" style="min-width:70px;padding:8px;"><div class="lbl">橙色</div><div class="val" style="font-size:18px;color:${weekly.counts.orange>=4?'var(--amber)':'var(--text)'};">${weekly.counts.orange}</div></div>
          <div class="mc" style="min-width:70px;padding:8px;"><div class="lbl">讲话</div><div class="val" style="font-size:18px;color:var(--text);">${weekly.counts.speech}</div></div>
          <div class="mc" style="min-width:70px;padding:8px;"><div class="lbl">假期</div><div class="val" style="font-size:18px;color:var(--text);">${weekly.counts.holiday}</div></div>
        </div>
      </div>
      <div style="border-top:1px dashed rgba(255,255,255,.06);padding-top:10px;">
        <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">本周 TOP 3 风险事件</div>
        <div style="display:flex;flex-direction:column;gap:4px;">${top3HTML}</div>
      </div>
    </div>

    <!-- 5-day strip -->
    <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">本周日历 — 点击查看具体事件</div>
    <div style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-bottom:14px;">
      ${stripHTML}
    </div>

    <!-- Detail panel for selected day -->
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:12px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:10px;">
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--text);">${esc(dnDetail)} ${detailDate===today?'<span class="badge b-good" style="font-size:9px;margin-left:6px;">TODAY</span>':''}</div>
          <div style="font-size:11px;color:${detailLevelColor};font-weight:600;margin-top:4px;">${esc(detailAdvice)}</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn-sm" onclick="MKT_selectDay('${today}')">回到今日</button>
        </div>
      </div>
      <div style="overflow-x:auto;"><table style="width:100%;font-size:12px;">
        <thead>
          <tr style="background:#1a1f2c;">
            <th style="font-size:9px;padding:6px;color:var(--muted);text-align:left;" title="${esc(dispTZ)}">时间 (${esc(MKT_CAL._tzShortLabel(dispTZ))})</th>
            <th style="font-size:9px;padding:6px;color:var(--muted);text-align:left;">CCY</th>
            <th style="font-size:9px;padding:6px;color:var(--muted);text-align:center;">影响</th>
            <th style="font-size:9px;padding:6px;color:var(--muted);text-align:left;">事件</th>
            <th style="font-size:9px;padding:6px;color:var(--muted);text-align:right;">实际</th>
            <th style="font-size:9px;padding:6px;color:var(--muted);text-align:right;">预测</th>
            <th style="font-size:9px;padding:6px;color:var(--muted);text-align:right;">前值</th>
          </tr>
        </thead>
        <tbody>${detailRows}</tbody>
      </table></div>
    </div>

    <div class="small-note" style="margin-top:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
      <span>数据源：ForexFactory XML（本周 + 下周）${sourceFF?`，已加载 ${sourceFF} 条`:''}${sourceManual?` + ${sourceManual} 条手动/金十`:''}。FF 原始时区为 <strong>US Eastern (EDT/EST)</strong>，已自动换算到下方所选显示时区。</span>
      <span style="display:inline-flex;align-items:center;gap:6px;">
        显示时区：
        <select onchange="MKT_changeDisplayTZ(this.value)" style="font-size:11px;padding:3px 6px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:3px;">
          <option value="" ${!localStorage.getItem('pg_mkt_displayTZ')?'selected':''}>🌐 浏览器本地 (${esc(MKT_CAL._tzShortLabel(Intl.DateTimeFormat().resolvedOptions().timeZone))})</option>
          <option value="Asia/Shanghai" ${dispTZ==='Asia/Shanghai'?'selected':''}>北京 / 上海</option>
          <option value="Asia/Hong_Kong" ${dispTZ==='Asia/Hong_Kong'?'selected':''}>香港</option>
          <option value="Asia/Tokyo" ${dispTZ==='Asia/Tokyo'?'selected':''}>东京</option>
          <option value="Asia/Singapore" ${dispTZ==='Asia/Singapore'?'selected':''}>新加坡</option>
          <option value="Europe/London" ${dispTZ==='Europe/London'?'selected':''}>伦敦</option>
          <option value="America/New_York" ${dispTZ==='America/New_York'?'selected':''}>纽约 (与 ForexFactory 网站默认一致)</option>
          <option value="UTC" ${dispTZ==='UTC'?'selected':''}>UTC</option>
        </select>
      </span>
    </div>
  </div>`;
}

// ── Filter popup (matches Forex Factory's Filter UI from image 2) ──
function renderMktFilterPanel(){
  const f = S.mktFilter;
  const allImpacts = ['High','Medium','Low','Holiday'];
  const impactLabels = {High:'🔴 红',Medium:'🟠 橙',Low:'🟡 黄',Holiday:'🏖 假期'};
  const allCcy = ['USD','EUR','GBP','JPY','CNY','CAD','AUD','NZD','CHF'];
  const allTypes = ['Growth','Inflation','Employment','Central Bank','Speeches','Bonds','Housing','Consumer Surveys','Business Surveys','Misc'];
  const cb = (group, key, label) => {
    const checked = (f[group]||[]).includes(key);
    return `<label class="check-row" style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;cursor:pointer;">
      <input type="checkbox" ${checked?'checked':''} onchange="MKT_toggleFilter('${group}','${esc(key)}',this.checked)" style="margin:0;width:14px;height:14px;cursor:pointer;">
      <span>${label}</span>
    </label>`;
  };
  return `<div style="background:var(--surface2);border:2px solid var(--accent);border-radius:6px;padding:14px;margin-bottom:12px;box-shadow:0 4px 16px rgba(0,0,0,.4);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:13px;font-weight:700;color:var(--text);">🔽 事件筛选</div>
      <button class="btn-sm" onclick="MKT_toggleFilterPanel()">✕ 关闭</button>
    </div>

    <div class="g3" style="margin-bottom:12px;">
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;">Expected Impact</div>
          <div style="font-size:10px;color:var(--accent);"><a href="javascript:MKT_filterAll('impacts')" style="color:var(--accent);">all</a> · <a href="javascript:MKT_filterNone('impacts')" style="color:var(--muted);">none</a></div>
        </div>
        ${allImpacts.map(i=>cb('impacts',i,impactLabels[i])).join('')}
      </div>

      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;">Event Types</div>
          <div style="font-size:10px;color:var(--accent);"><a href="javascript:MKT_filterAll('types')" style="color:var(--accent);">all</a> · <a href="javascript:MKT_filterNone('types')" style="color:var(--muted);">none</a></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 8px;">
          ${allTypes.map(t=>cb('types',t,t)).join('')}
        </div>
      </div>

      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;">Currencies</div>
          <div style="font-size:10px;color:var(--accent);"><a href="javascript:MKT_filterAll('currencies')" style="color:var(--accent);">all</a> · <a href="javascript:MKT_filterNone('currencies')" style="color:var(--muted);">none</a></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 8px;">
          ${allCcy.map(c=>cb('currencies',c,c)).join('')}
        </div>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:8px;padding:10px;background:rgba(0,0,0,.2);border-radius:4px;margin-bottom:12px;">
      <span style="font-size:11px;color:var(--muted);">关键字搜索：</span>
      <input type="text" placeholder="例如 CPI / Powell / FOMC" value="${esc(f.search||'')}" oninput="MKT_setSearch(this.value)" style="flex:1;font-size:12px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:3px;">
    </div>

    <div style="display:flex;justify-content:flex-end;gap:8px;">
      <button class="btn-sm" onclick="MKT_resetFilter()" style="color:var(--red);">🗑 Remove Filter</button>
      <button class="btn-sm btn-primary" onclick="MKT_toggleFilterPanel()">✓ Apply</button>
    </div>
  </div>`;
}

// ── Filter actions ──
window.MKT_toggleFilterPanel = function(){
  S.mktFilter.filterPanelOpen = !S.mktFilter.filterPanelOpen;
  if(S.page==='roadmap') renderRoadmap();
};
window.MKT_toggleFilter = function(group, key, checked){
  const list = S.mktFilter[group] || [];
  if(checked){ if(!list.includes(key)) list.push(key); }
  else { S.mktFilter[group] = list.filter(x=>x!==key); }
  if(checked) S.mktFilter[group] = list;
  // Persist
  try{ localStorage.setItem('pg_mkt_filter', JSON.stringify(S.mktFilter)); }catch(e){}
  if(S.page==='roadmap') renderRoadmap();
};
window.MKT_filterAll = function(group){
  const all = {
    impacts:['High','Medium','Low','Holiday'],
    currencies:['USD','EUR','GBP','JPY','CNY','CAD','AUD','NZD','CHF'],
    types:['Growth','Inflation','Employment','Central Bank','Speeches','Bonds','Housing','Consumer Surveys','Business Surveys','Misc']
  };
  S.mktFilter[group] = all[group] || [];
  try{ localStorage.setItem('pg_mkt_filter', JSON.stringify(S.mktFilter)); }catch(e){}
  if(S.page==='roadmap') renderRoadmap();
};
window.MKT_filterNone = function(group){
  S.mktFilter[group] = [];
  try{ localStorage.setItem('pg_mkt_filter', JSON.stringify(S.mktFilter)); }catch(e){}
  if(S.page==='roadmap') renderRoadmap();
};
window.MKT_setSearch = function(v){
  S.mktFilter.search = v;
  try{ localStorage.setItem('pg_mkt_filter', JSON.stringify(S.mktFilter)); }catch(e){}
  // Don't full re-render on every keystroke (would lose focus); update only on changes that matter
  // The next render (e.g. tab switch) will pick it up.
  // Use a debounce timer for live update:
  if(window._mktSearchT) clearTimeout(window._mktSearchT);
  window._mktSearchT = setTimeout(()=>{ if(S.page==='roadmap') renderRoadmap(); }, 350);
};
window.MKT_resetFilter = function(){
  S.mktFilter.impacts    = ['High','Medium','Low','Holiday'];

// Add a short user-friendly label for a timezone (e.g. "CST", "EDT", "BST").
// Used in column headers so the user knows which TZ they're looking at.
MKT_CAL._tzShortLabel = function(tz){
  if(!tz) return '本地';
  try{
    const parts = new Intl.DateTimeFormat('en-US', {timeZone: tz, timeZoneName:'short'}).formatToParts(new Date());
    const tzPart = parts.find(p=>p.type==='timeZoneName');
    if(tzPart && tzPart.value) return tzPart.value;
  }catch(e){}
  // Fallback: short city name
  const m = tz.match(/\/([^/]+)$/);
  return m ? m[1].replace(/_/g,' ') : tz;
};

// Change the display timezone (called from the dropdown in the market card footer).
// Empty value means "use browser local".
window.MKT_changeDisplayTZ = function(tz){
  if(!tz){
    try{ localStorage.removeItem('pg_mkt_displayTZ'); }catch(e){}
    MKT_CAL._displayTZOverride = null;
  } else {
    MKT_CAL.setDisplayTZ(tz);
  }
  // Reproject all events to the new TZ
  MKT_CAL.reprojectEvents();
  // Update the selected day to the new "today" so user isn't stuck on a now-empty day
  S.mktSelectedDate = null;
  if(S.page==='roadmap') renderRoadmap();
};

function ensureTodayJournal(){
  const currentDate = S.journalDate || new Date().toISOString().slice(0,10);
  let j = gj(currentDate);
  if(!j){
    j = {id:currentDate,date:currentDate,accountId:ga()?.id||'',sessionFocus:'NY AM',setupFocus:'A+',bias:'',htfAlign:'Yes',news:'No',macroWindow:'',maxTrades:ga()?.rules?.maxTradesPerDay||3,notesPre:'',review:'',bestTrade:'',worstTrade:'',mistakeTag:'',mood:'',missedTrade:'No'};
  }
  if(!j.accountId) j.accountId = ga()?.id || '';
  return j;
}
function journalInput(label,id,val='',type='text',extra=''){
  if(type==='textarea') return `<div class="fg"><label>${label}</label><textarea id="${id}" rows="3"${extra}>${esc(val||'')}</textarea></div>`;
  if(type==='select') return `<div class="fg"><label>${label}</label><select id="${id}" ${extra}>${val}</select></div>`;
  return `<div class="fg"><label>${label}</label><input id="${id}" value="${esc(val||'')}" ${extra}></div>`;
}
function getJournalCalendarModel(dateStr, aid){
  const base = dateStr ? new Date(dateStr+'T12:00:00') : new Date();
  const year = base.getFullYear();
  const month = base.getMonth();
  const first = new Date(year, month, 1);
  const start = new Date(first);
  start.setDate(first.getDate() - first.getDay());
  const cells = [];
  for(let i=0;i<42;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    const date = d.toISOString().slice(0,10);
    const trades = S.trades.filter(t=>t.date===date && (!aid || t.aid===aid));
    const pnl = trades.reduce((s,t)=>s+(t.pnl||0),0);
    const journal = gj(date);
    cells.push({
      date,
      day:d.getDate(),
      inMonth:d.getMonth()===month,
      isToday:date===new Date().toISOString().slice(0,10),
      isSelected:date===dateStr,
      trades,
      pnl,
      journal
    });
  }
  return {year,month,cells};
}
function renderJournalCalendar(dateStr, aid){

  const monthName = new Date(`${model.year}-${String(model.month+1).padStart(2,'0')}-01T12:00:00`).toLocaleDateString('en-US',{month:'short',year:'numeric'});
  const monthPnl = model.cells.filter(c=>c.inMonth).reduce((s,c)=>s+c.pnl,0);
  const weekNames = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  return `<div class="journal-calendar-wrap">
    <div class="journal-cal-head">
      <div>
        <div class="card-title" style="margin-bottom:4px;">Journal Calendar</div>
        <div class="journal-cal-title">Monthly P/L: <span style="color:${pnlC(monthPnl)}">${$m(monthPnl,2)}</span></div>

      </div>
    </div>
    <div class="journal-cal-grid">
      ${weekNames.map(w=>`<div class="journal-weekday">${w}</div>`).join('')}
      ${model.cells.map(c=>{
        const bg = c.pnl>0?`background:linear-gradient(180deg,rgba(20,83,45,.42),rgba(8,14,25,.98));` : c.pnl<0?`background:linear-gradient(180deg,rgba(127,29,29,.38),rgba(8,14,25,.98));` : '';
        return `<div class="journal-day-cell ${c.isSelected?'is-selected':''} ${c.isToday?'is-today':''} ${c.inMonth?'':'is-other'}" style="${bg}" onmouseenter="showJournalPreview('${c.date}', this)" onmouseleave="hideJournalPreview()" onclick="loadJournalDate('${c.date}');${c.trades.length?`openDayTradesPanel('${c.date}')`:``}">
          <div class="journal-day-num">${c.day}</div>
          ${c.journal?`<div class="journal-day-journal">Saved</div>`:''}
          ${c.trades.length?`<div class="journal-day-pnl" style="color:${pnlC(c.pnl)}">${$m(c.pnl)}</div><div class="journal-day-meta">${c.trades.length} trades</div>`:`<div class="journal-day-empty">${c.journal?'No trades':'Add journal'}</div>`}

          </div>
        </div>`;
      }).join('')}

  </div>`;

function renderJournalSuggestionDiff(s){
  const diffs = [];
  const cur = ensureTodayJournal();
  const curMood = (cur.mood||'').trim();
  const curBest = (cur.bestTrade||'').trim();
  const curWorst = (cur.worstTrade||'').trim();
  const curMistake = (cur.mistakeTag||'').trim();
  const curReview = (cur.review||'').trim();
  if(curMood && s.mood && curMood !== s.mood) diffs.push(`当前心情「${curMood}」与自动建议「${s.mood}」不同`);
  if(curBest && s.bestTrade && curBest !== s.bestTrade) diffs.push('“今日最好的一笔”已被你手动改写');
  if(curWorst && s.worstTrade && curWorst !== s.worstTrade) diffs.push('“今日最不该做的一笔”已被你手动改写');
  if(curMistake && s.mistakeTag && curMistake !== s.mistakeTag) diffs.push(`当前错误标签为「${curMistake}」，自动建议为「${s.mistakeTag}」`);
  if(curReview && s.review && curReview !== s.review) diffs.push('盘后总结与系统建议不一致，这通常说明你已经做了主观修正');
  if(!diffs.length) return '';
  return `<div class="journal-suggestion-diff"><strong>当前盘后复盘与自动建议存在差异：</strong><br>${diffs.map(d=>`• ${esc(d)}`).join('<br>')}</div>`;
}

window._journalImgBuffer = null;
window.addJournalImgs = function(input){
  const date = document.getElementById('journal-date')?.value;
  const existing = gj(date);
  const current = window._journalImgBuffer || (existing?.images ? [...existing.images] : []);
  const files = Array.from(input.files);

        const wrap = document.getElementById('journal-img-wrap');

window.overrideCompliance=async function(tid,status){
  if(!window.fbSetDoc)return;
  const t=S.trades.find(x=>x.id===tid);if(!t)return;
  const comp={...t.compliance,userOverride:status,userConfirmed:true};
  await window.fbSetDoc("trades",tid,{...t,compliance:comp});
  renderAccounts();
};
window.toggleStatus=async function(id,status){
  if(!window.fbSetDoc)return;
  const ac=S.accounts.find(a=>a.id===id);if(!ac)return;
  await window.fbSetDoc('accounts',id,{...ac,status});
};

window.setCompliance=async function(tradeId,action){
  const t=S.trades.find(x=>x.id===tradeId);if(!t||!window.fbUpdateDoc)return;
  const comp={...t.compliance,userConfirmed:true};
  if(action==='to_compliant'){comp.userOverride='compliant';comp.status='compliant';}
  else if(action==='to_suspected'){comp.userOverride='suspected';comp.status='suspected';}
  await window.fbUpdateDoc('trades',tradeId,{compliance:comp});
};

window.reanalyzeAll=async function(){
  if(!window.fbUpdateDoc)return;
  if(!confirm('重新分析所有交易合规状态？已人工审核的结果将保留。'))return;
  setSyncStatus('saving','分析中...');
  for(const t of S.trades){
    const ac=S.accounts.find(a=>a.id===t.aid);if(!ac)continue;
    const prev=t.compliance;
    const newC=CE.analyze(t,ac,S.trades);
    if(prev?.userConfirmed){newC.userConfirmed=prev.userConfirmed;newC.userOverride=prev.userOverride;if(prev.userOverride)newC.status=prev.userOverride;}
    await window.fbUpdateDoc('trades',t.id,{compliance:newC});
  }
  setSyncStatus('ok','已同步');
  alert('✓ 全部交易已重新分析');
};

// ── Market events: fetch + persist ──
// Fetches both THIS WEEK and NEXT WEEK in parallel for richer planning.
window.MKT_refresh = async function(force){
  if(S.mktEventsLoading) return;
  S.mktEventsLoading = true; S.mktEventsError = ''; renderMktStatus();
  try{
    let xmlThis = null, xmlNext = null, lastErr = null;
    // This week
    for(const url of MKT_CAL.FF_URLS){
      try{ xmlThis = await MKT_CAL.fetchWithFallback(url); if(xmlThis) break; }
      catch(e){ lastErr = e; }
    }
    if(!xmlThis) throw lastErr || new Error('ForexFactory 抓取失败');
    // Next week (best-effort; failure here is non-fatal)
    for(const url of MKT_CAL.FF_URLS_NEXT){
      try{ xmlNext = await MKT_CAL.fetchWithFallback(url); if(xmlNext) break; }
      catch(e){ /* try next */ }
    }
    let events = MKT_CAL.parseFFXML(xmlThis);
    if(xmlNext){
      try{
        const nextEvts = MKT_CAL.parseFFXML(xmlNext);
        // dedupe by id
        const seen = new Set(events.map(e=>e.id));
        nextEvts.forEach(e=>{ if(!seen.has(e.id)) events.push(e); });
      }catch(_){}
    }
    // Always re-tag (eventType / isSpeech) — handles legacy cached data
    events.forEach(e=>{
      if(!e.eventType) e.eventType = MKT_CAL.categorize(e);
      if(e.isSpeech === undefined) e.isSpeech = MKT_CAL.isSpeech(e);
    });
    // Merge with manual events (keep manual entries + replace FF ones with fresh fetch)
    const manual = S.marketEvents.filter(e=>e.source==='manual' || e.source==='jin10');
    manual.forEach(e=>{
      if(!e.eventType) e.eventType = MKT_CAL.categorize(e);
      if(e.isSpeech === undefined) e.isSpeech = MKT_CAL.isSpeech(e);
    });
    S.marketEvents = [...manual, ...events].sort((a,b)=>(a.date+a.timeNY).localeCompare(b.date+b.timeNY));
    S.mktEventsLoaded = true;
    try{ localStorage.setItem('pg_mkt_events_ff', JSON.stringify({ts:Date.now(), events})); }catch(e){}
  }catch(e){
    S.mktEventsError = e.message || '网络错误';
    // Try localStorage cache
    try{
      const cached = JSON.parse(localStorage.getItem('pg_mkt_events_ff')||'null');
      if(cached && cached.events && Array.isArray(cached.events)){
        cached.events.forEach(e=>{
          if(!e.eventType) e.eventType = MKT_CAL.categorize(e);
          if(e.isSpeech === undefined) e.isSpeech = MKT_CAL.isSpeech(e);
        });
        const manual = S.marketEvents.filter(ev=>ev.source==='manual'||ev.source==='jin10');
        S.marketEvents = [...manual, ...cached.events].sort((a,b)=>(a.date+a.timeNY).localeCompare(b.date+b.timeNY));
        S.mktEventsLoaded = true;
        S.mktEventsError += '（使用上次缓存）';
      }
    }catch(_){}
  }
  S.mktEventsLoading = false;
  renderMktStatus(); renderMktEventsPreview();
  if(S.page==='roadmap') renderRoadmap();
};

window.saveManualEvent = async function(){
  const inDate = document.getElementById('evf-d').value;
  const inTime = document.getElementById('evf-t').value;
  if(!inDate){ alert('请至少填写日期'); return; }
  // Treat manual entries as US Eastern time (matches the FF source TZ),
  // compute the absolute UTC instant, then project to current display TZ.
  const dm = inDate.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!dm){ alert('日期格式不正确'); return; }
  const y=+dm[1], mo=+dm[2], d=+dm[3];
  let h=0, mi=0;
  const tm = (inTime||'').match(/^(\d{1,2}):(\d{2})/);
  if(tm){ h=+tm[1]; mi=+tm[2]; }
  const off = TIME_ENGINE._tzOffsetMin('America/New_York', y, mo, d, h, mi);
  const utcMs = Date.UTC(y, mo-1, d, h, mi) - off*60000;
  const dispTZ = MKT_CAL.getDisplayTZ();
  const disp = MKT_CAL._wallClockInTZ(utcMs, dispTZ);
  const ev = {
    id: 'mn_'+uid(),
    source: 'manual',
    srcDate: inDate,
    srcTime: inTime||'',
    srcTZ: 'America/New_York',
    utcMs,
    date: `${disp.year}-${String(disp.month).padStart(2,'0')}-${String(disp.day).padStart(2,'0')}`,
    timeNY: inTime ? `${String(disp.hour).padStart(2,'0')}:${String(disp.minute).padStart(2,'0')}` : '',
    country: document.getElementById('evf-c').value.trim().toUpperCase(),
    impact: document.getElementById('evf-i').value,
    title: document.getElementById('evf-t2').value.trim(),
    notes: document.getElementById('evf-n').value.trim(),
    forecast:'', previous:''
  };
  if(!ev.title){ alert('请至少填写标题'); return; }
  ev.eventType = MKT_CAL.categorize(ev);
  ev.isSpeech  = MKT_CAL.isSpeech(ev);
  S.marketEvents.push(ev);
  try{ localStorage.setItem('pg_mkt_events_manual', JSON.stringify(S.marketEvents.filter(e=>e.source==='manual'||e.source==='jin10'))); }catch(e){}
  if(window.fbSetDoc){
    try{ await window.fbSetDoc('market_events', ev.id, ev); }catch(e){}
  }
  document.querySelectorAll('div[style*="inset:0"]').forEach(d=>d.remove());
  renderMktEventsPreview();
  if(S.page==='roadmap') renderRoadmap();
};

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=ch;}
    vals.push(cur.trim());
    const obj={};headers.forEach((h,i)=>obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim());
    return obj;
  });
}
function parseDateStr(s){
  if(!s)return'';try{const d=new Date(s);if(!isNaN(d))return d.toISOString().slice(0,10);}catch(e){}return s.slice(0,10);
}
function parsePnl(s){if(!s)return 0;const c=String(s).replace(/[$,]/g,'').replace(/\(([^)]+)\)/,'−$1').replace('−','-');return parseFloat(c)||0;}
function parseTimeStr(s){if(!s)return'';const m=s.match(/(\d{1,2}):(\d{2})/);return m?`${m[1].padStart(2,'0')}:${m[2]}`:''}

window.previewCSV=function(type,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const rows=parseCSV(e.target.result);let trades=[];
      if(type==='tv'){
        trades=rows.filter(r=>r.symbol||r.sym).map(r=>{
          const raw = r.boughtTimestamp||r.date||'';
          const date = parseDateStr(raw);
          const time = parseTimeStr(raw);
          const cls = classifyFromCSV(raw, date, time, 'tv');
          return {
            sym:(r.symbol||r.sym||'').replace(/[A-Z]\d$/,''),
            dir:parseFloat(r.buyPrice||0)<parseFloat(r.sellPrice||0)?'Long':'Short',
            c:parseInt(r.qty||r.size||'1')||1,pnl:parsePnl(r.pnl||r.PnL),
            date, time, risk:0,
            _entryPrice:parseFloat(r.buyPrice||0).toFixed(2),
            _exitPrice:parseFloat(r.sellPrice||0).toFixed(2),
            session: cls.session,
            macroWindow: cls.macro || '',
            note:`${r.buyPrice||''}→${r.sellPrice||''} ${r.duration||''}`
          };
        });
      } else if(type==='ts'){
        trades=rows.filter(r=>r.ContractName||r.contract).map(r=>{
          const raw = r.EnteredAt||r.date||'';
          const date = parseDateStr(raw);
          const time = parseTimeStr(raw);
          const cls = classifyFromCSV(raw, date, time, 'ts');
          return {
            sym:(r.ContractName||r.contract||'').match(/^[A-Z]+/)?.[0]||'',
            dir:r.Type||r.direction||'Long',
            c:parseInt(r.Size||r.size||'1')||1,pnl:parsePnl(r.PnL||r.pnl),
            date, time, risk:0,
            _csvFees: parsePnl(r.Fees||r.fees||'0') + parsePnl(r.Commissions||r.commissions||'0'),
            _entryPrice:parseFloat(r.EntryPrice||0).toFixed(1),_exitPrice:parseFloat(r.ExitPrice||0).toFixed(1),
            session: cls.session,
            macroWindow: cls.macro || '',
            note:`进价:${r.EntryPrice||''} 出价:${r.ExitPrice||''}`
          };
        });
      } else if(type==='nt'){
        trades=rows.filter(r=>r['日期 Date']||r['💰金额']!==undefined).map(r=>{
          const date = parseDateStr(r['日期 Date']||'');
          const time = r['Time']||r['时间']||'';
          const cls = classifyFromCSV('', date, time, 'nt');
          return {
            sym:r['Instrument']||r.sym||'其他',dir:r['Bias']==='Bearish'?'Short':'Long',
            c:parseInt(r['Size']||'1')||1,pnl:parsePnl(r['💰金额']||r.pnl||''),
            date, time, risk:0,
            session:r['Session']||cls.session||'NY AM',
            macroWindow: cls.macro || '',
            setup:(r['Set up']||'B').includes('A+')?'A+':'B',
            note:r['总结']||''
          };
        });
      } else {
        trades=rows.map(r=>{
          const date = parseDateStr(r.date||r.Date||'');
          const time = r.time||r.Time||'';
          const cls = classifyFromCSV('', date, time, 'gen');
          return {
            sym:r.sym||r.symbol||r.instrument||'',dir:r.dir||r.direction||r.side||'Long',
            c:parseInt(r.c||r.contracts||r.lots||r.size||'1')||1,
            pnl:parsePnl(r.pnl||r.profit||r.PnL||''),
            date, time,
            risk:parseFloat(r.risk||'0')||0,note:r.note||r.notes||'',
            session: cls.session,
            macroWindow: cls.macro || '',
            tradeQuality:r.tradeQuality||r.quality||r['Trade Quality']||'B',
            shouldTrade:(r.shouldTrade||r['Should Trade']||'yes').toString().toLowerCase()==='no'?'no':'yes',
            shouldTradeReason:r.shouldTradeReason||r.reason||r['Should Trade Reason']||'',
            holdMinutes:parseFloat(r.holdMinutes||r['Hold Minutes']||'0')||0,
            beHit:(r.beHit||r['BE Hit']||'no').toString().toLowerCase()==='yes'?'yes':'no',
            beRunner:(r.beRunner||r['BE Runner']||'na').toString().toLowerCase()
          };
        });
      }
      trades=trades.filter(t=>t.date&&t.sym);
      window[`_csv_${type}`]=trades;
      const totalPnl=trades.reduce((s,t)=>s+t.pnl,0);
      // Pre-check duplicates using same robust fingerprint (no pnl)
      const previewAid=document.getElementById('import-aid')?.value||'';
      const existingFps=new Set(S.trades.filter(t=>t.aid===previewAid).map(tradeFP));
      const dupCount=trades.filter(t=>existingFps.has(tradeFP(t))).length;
      const newCount=trades.length-dupCount;
      // Estimate commission for preview
      const commOneLegPrev = type==='ts'?(parseFloat(document.getElementById('comm-ts')?.value)||0)
                           : type==='tv'?(parseFloat(document.getElementById('comm-tv')?.value)||0):0;
      const commRTPrev=commOneLegPrev*2;
      // For TopStep: use actual Fees from CSV if available (sum of _csvFees), else fall back to estimate
      const hasTSFees = type==='ts' && trades.length>0 && trades.some(t=>t._csvFees>0);
      const totalComm = hasTSFees
        ? trades.slice(0,newCount).reduce((s,t)=>s+(t._csvFees||0),0)
        : commRTPrev>0 ? trades.slice(0,newCount).reduce((s,t)=>s+commRTPrev*(parseInt(t.c)||1),0) : 0;
      const adjTotalPnl=totalPnl-totalComm;
      const feeLabel = hasTSFees ? `CSV实际Fees` : `$${commRTPrev.toFixed(2)}/手往返`;
      document.getElementById(`preview-${type}`).innerHTML=trades.length===0?`<div style="color:var(--red);padding:11px;">未能解析数据，请检查文件格式</div>`:`

function normSym(sym){
  if(!sym)return'';
  // Strip contract expiry: MNQH25→MNQ, MNQM25→MNQ, ESH25→ES
  return sym.toUpperCase().replace(/([A-Za-z])([HMUZ]\d{0,2})$/,'$1').replace(/\d+$/,'');
}
function tradeFP(t){
  // Fingerprint without pnl — immune to commission adjustments and CSV rounding
  return`${t.date}|${(t.time||'').slice(0,5)}|${normSym(t.sym)}|${(t.dir||'').toLowerCase().slice(0,2)}|${t.c||1}|${t._entryPrice||''}|${t._exitPrice||''}`;
}
function parseTVSession(ts){
  // Legacy helper retained for backwards compatibility; now backed by TIME_ENGINE.
  // `ts` from Tradovate/TopStep CSVs is normally already in NY time.
  // We classify it as NY local (set inputTZ temporarily OR just use the string directly).
  if(!ts) return 'NY AM';
  const m = String(ts).match(/(\d{4})-(\d{1,2})-(\d{1,2})[T\s]?(\d{1,2}):(\d{2})/);
  if(!m){
    const t = String(ts).match(/(\d{1,2}):(\d{2}):\d{2}$/);
    if(!t) return 'NY AM';
    const h=+t[1], mi=+t[2];
    return TIME_ENGINE.detectKillzone({totalMinutes:h*60+mi,hour:h,minute:mi}) || 'Other';
  }
  const h=+m[4], mi=+m[5];
  return TIME_ENGINE.detectKillzone({totalMinutes:h*60+mi,hour:h,minute:mi}) || 'Other';
}
// Classify a raw timestamp string from a CSV. The CSV timestamps from broker exports
// (Tradovate/TopStep/Lucid) are broker-local — by convention they are already NY time.
// For Notion/Generic CSVs without TZ info, we assume TIME_ENGINE.settings.inputTZ.
function classifyFromCSV(tsRaw, dateStr, timeStr, csvType){
  // csvType: 'tv' | 'ts' | 'nt' | 'gen'
  if(csvType==='tv' || csvType==='ts'){
    // Broker-local = NY already. Don't re-convert.
    const m = String(tsRaw||'').match(/(\d{4})-(\d{1,2})-(\d{1,2})[T\s]?(\d{1,2}):(\d{2})/);
    if(m){
      const h=+m[4], mi=+m[5];
      const fakeNY = {totalMinutes:h*60+mi,hour:h,minute:mi};
      return { session: TIME_ENGINE.detectKillzone(fakeNY) || 'Other',
               macro:   TIME_ENGINE.detectMacro(fakeNY) };
    }
    // fallback: treat provided date/time as already NY
    if(dateStr && timeStr){
      const tm = timeStr.match(/(\d{1,2}):(\d{2})/);
      if(tm){
        const fakeNY = {totalMinutes:(+tm[1])*60+(+tm[2]),hour:+tm[1],minute:+tm[2]};
        return { session: TIME_ENGINE.detectKillzone(fakeNY) || 'Other',
                 macro:   TIME_ENGINE.detectMacro(fakeNY) };
      }
    }
    return { session:'Other', macro:null };
  }
  // nt / gen: apply TIME_ENGINE inputTZ→NY conversion
  return {
    session: autoSession(dateStr, timeStr||'00:00'),
    macro:   autoMacro(dateStr, timeStr||'00:00')
  };
}

window.doImport=async function(type){
  const trades=window[`_csv_${type}`];
  const aid=document.getElementById('import-aid').value;
  if(!trades||!aid){alert('请先选择账户并上传文件');return;}
  if(!window.fbSetDoc){alert('请先登录');return;}
  const account=S.accounts.find(a=>a.id===aid);

  // Pick the right commission rate per broker type (single leg; ×2 = round-trip)
  const commOneLeg = type==='ts' ? (parseFloat(document.getElementById('comm-ts')?.value)||0)
                   : type==='tv' ? (parseFloat(document.getElementById('comm-tv')?.value)||0)
                   : 0;
  const commRT = commOneLeg * 2; // round-trip per contract

  // Fingerprint without pnl — immune to commission adjustments and CSV float rounding
  const existingFps=new Set(S.trades.filter(t=>t.aid===aid).map(tradeFP));

  let count=0,skipped=0,commTotal=0;
  setSyncStatus('saving','导入中...');
  const toWrite=[];
  for(const t of trades){
    if(!t.date)continue;
    const fp=tradeFP(t);
    if(existingFps.has(fp)){skipped++;continue;}
    existingFps.add(fp);
    const contracts=parseInt(t.c)||1;
    const comm = (type==='ts' && t._csvFees>0)
      ? t._csvFees
      : commRT>0 ? +(commRT*contracts).toFixed(2) : 0;
    const adjPnl=comm>0?+(t.pnl-comm).toFixed(2):t.pnl;
    commTotal+=comm;
    const newT={id:uid(),aid,...t,pnl:adjPnl,_rawPnl:t.pnl,_commission:comm,
      session:t.session||autoSession(t.date,t.time||''),
      macroWindow: (t.macroWindow !== undefined) ? t.macroWindow : (autoMacro(t.date,t.time||'')||''),
      followPlan:true,stopLossRespected:true,revenge:false,fomo:false};
    const rt=calcTradeRiskLabel(newT,aid);
    newT.riskLabel=rt.label;newT.riskScore=rt.score;newT.riskReasons=rt.reasons;
    newT.compliance=CE.analyze(newT,account,[...S.trades,...[newT]]);
    toWrite.push(newT);
  }
  await window.fbBatchWrite('trades', toWrite.map(t=>({id:t.id,data:t})));
  count=toWrite.length;
  setSyncStatus('ok','已同步');
  updateHeader();
  let msg=`✓ 导入 ${count} 条`;
  if(skipped>0) msg+=`，跳过 ${skipped} 条重复`;
  if(commTotal>0) msg+=`\n已自动扣除手续费合计: $${commTotal.toFixed(2)}（$${commRT}/手往返）`;
  msg+=`\n待审核: ${CE.pendingCount()} 条`;
  alert(msg);
  if(count>0)goPage('compliance');
};

};

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PropGuard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0b0d13;--surface:#10131a;--surface2:#14171f;--border:#1c2030;
  --border2:#232840;--text:#c9cdd8;--muted:#5a6070;--muted2:#383d4a;
  --accent:#3b6cf8;--accent2:rgba(59,108,248,.15);
  --green:#2bab85;--red:#e85555;--amber:#e8a020;--blue:#4a9ef0;--purple:#7c5cbf;
  --green-bg:rgba(43,171,133,.08);--red-bg:rgba(232,85,85,.08);--amber-bg:rgba(232,160,32,.08);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;font-size:13px;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:7px 10px;font-size:13px;font-family:inherit;outline:none;width:100%;transition:border-color .12s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 1px rgba(41,98,255,.2);}
select option{background:var(--surface2);}
button{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .12s;letter-spacing:.01em;}
button:hover{background:var(--border);border-color:#3d4356;}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.btn-primary:hover{background:#1e53e5;border-color:#1e53e5;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-danger:hover{background:rgba(239,83,80,.1);color:var(--red);border-color:rgba(239,83,80,.4);}
/* TV number style */
.mono,.val,.big-num,.engine-score,.rm-pct,.journal-day-pnl,.journal-stat-box .v,.journal-selected-date,.mc .val{font-family:'IBM Plex Mono','SF Mono','Consolas',monospace;font-variant-numeric:tabular-nums;}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh;}
#topbar{display:flex;align-items:center;gap:10px;padding:0 18px;height:44px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;background:var(--surface);}
#topbar h1{font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
#topbar h1 span{color:var(--accent);}
#topbar-sub{font-size:10px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;}
#topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
#sync-status{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.04em;}
#sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted2);}
#sync-dot.ok{background:var(--green);}
#sync-dot.saving{background:var(--amber);}
#sync-dot.err{background:var(--red);}
#user-info{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);}
#user-avatar{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);}
#user-name{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#sign-out-btn{font-size:10px;padding:3px 8px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:3px;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;}
#sign-out-btn:hover{border-color:var(--red);color:var(--red);}

/* Protection Banner */
@keyframes pulse-red{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes pulse-amb{0%,100%{opacity:1}50%{opacity:.7}}
#prot-banner{display:none;padding:6px 18px;font-size:11px;font-weight:700;border-bottom:1px solid;align-items:center;gap:10px;flex-shrink:0;letter-spacing:.02em;}
#prot-banner.danger{display:flex;background:rgba(239,83,80,.08);border-color:rgba(239,83,80,.4);color:var(--red);animation:pulse-red 2s infinite;}
#prot-banner.warn{display:flex;background:rgba(247,166,0,.07);border-color:rgba(247,166,0,.3);color:var(--amber);animation:pulse-amb 2.5s infinite;}

/* Alert bar */
#alert-bar{display:none;padding:7px 18px;font-size:11px;border-bottom:1px solid;}
#alert-bar.danger{background:rgba(239,83,80,.08);border-color:rgba(239,83,80,.35);color:var(--red);animation:pulse-red 2s infinite;}
#alert-bar.warning{background:rgba(247,166,0,.06);border-color:rgba(247,166,0,.28);color:var(--amber);}

/* Main */
#main{display:flex;flex:1;overflow:hidden;}
#sidebar{width:210px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;background:var(--surface);}
@media(max-width:768px){#sidebar{display:none;}#sidebar.open{display:flex;position:fixed;top:0;left:0;height:100vh;z-index:100;background:var(--surface);width:220px;}}
#content{flex:1;overflow-y:auto;padding:18px;}
@media(max-width:600px){#content{padding:12px;padding-bottom:70px;}}

/* Sidebar */
.nav-sec{padding:14px 14px 4px;font-size:9px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .12s;border-left:2px solid transparent;}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03);}
.nav-item.active{color:var(--text);background:rgba(41,98,255,.08);border-left-color:var(--accent);}
.nav-item .ic{font-size:13px;width:15px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700;letter-spacing:.02em;}
.acct-pill{display:flex;flex-direction:column;padding:6px 13px;cursor:pointer;border-left:2px solid transparent;transition:background .12s;}
.acct-pill:hover{background:rgba(255,255,255,.02);}
.acct-pill.active{background:rgba(41,98,255,.06);}
.acct-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.acct-name{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.acct-name.active{color:var(--text);}
.role-tag{display:inline-block;padding:1px 5px;border-radius:2px;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
.r-primary{background:rgba(41,98,255,.15);color:#6b8fff;}
.r-conservative{background:rgba(66,165,245,.15);color:#64b5f6;}
.r-aggressive{background:rgba(239,83,80,.15);color:#ef9a9a;}
.r-backup{background:rgba(247,166,0,.15);color:#ffcc02;}
.r-observer{background:rgba(120,123,134,.15);color:#9e9e9e;}
.r-recovery{background:rgba(156,39,176,.15);color:#ce93d8;}


.engine-card{background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--accent);border-radius:4px;padding:14px;margin-bottom:12px;}
.engine-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.engine-score{font-size:28px;font-weight:700;font-family:'IBM Plex Mono','SF Mono',monospace;line-height:1;letter-spacing:-.02em;}
.engine-status{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.es-allow{background:rgba(38,166,154,.1);color:var(--green);border:1px solid rgba(38,166,154,.3);}
.es-caution{background:rgba(247,166,0,.1);color:var(--amber);border:1px solid rgba(247,166,0,.3);}
.es-block{background:rgba(239,83,80,.1);color:var(--red);border:1px solid rgba(239,83,80,.3);}
.engine-reasons{list-style:none;font-size:11px;color:var(--muted);line-height:1.8;margin-top:8px;}
.engine-reasons li{position:relative;padding-left:14px;}
.engine-reasons li::before{content:'›';position:absolute;left:0;top:0;color:var(--amber);}
.journal-slab{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:12px;}
.journal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
@media(max-width:900px){.journal-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:520px){.journal-grid{grid-template-columns:1fr;}}
.journal-top-layout{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(340px,.95fr);gap:12px;margin-bottom:12px;}
@media(max-width:1100px){.journal-top-layout{grid-template-columns:1fr;}}
.journal-calendar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px;}
.journal-cal-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.journal-cal-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
.journal-cal-month{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);}
.journal-month-btn{width:28px;height:28px;border-radius:3px;padding:0;display:flex;align-items:center;justify-content:center;}
.journal-cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;}
.journal-weekday{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;padding:2px 4px 6px;}
.journal-day-cell{position:relative;min-height:96px;border:1px solid var(--border);border-radius:4px;padding:8px;background:var(--surface2);cursor:pointer;transition:border-color .12s,background .12s;overflow:hidden;}
.journal-day-cell:hover{border-color:rgba(41,98,255,.5);background:#1a1f2a;}
.journal-day-cell.is-selected{border-color:var(--accent);background:rgba(41,98,255,.06);}
.journal-day-cell.is-today{border-color:rgba(41,98,255,.3);}
.journal-day-cell.is-other{opacity:.3;}
.journal-day-num{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;}
.journal-day-pnl{font-size:16px;font-family:'IBM Plex Mono','SF Mono',monospace;font-weight:700;line-height:1.2;margin-top:8px;}
.journal-day-meta{font-size:10px;color:var(--muted2);margin-top:2px;}
.journal-day-journal{position:absolute;top:8px;right:8px;font-size:9px;color:var(--amber);display:flex;align-items:center;gap:3px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.journal-day-journal::before{content:'●';font-size:7px;}
.journal-day-empty{font-size:10px;color:var(--muted2);position:absolute;left:8px;bottom:8px;}
.journal-day-actions{position:absolute;right:6px;bottom:6px;display:flex;gap:4px;z-index:2;}
/* Hide the journal quick-write button — click the cell directly */
.journal-day-quick-btn{display:none !important;}
.journal-preview-pop{position:fixed;z-index:220;min-width:256px;max-width:310px;padding:12px;border-radius:4px;background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--accent);box-shadow:0 16px 40px rgba(0,0,0,.5);pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .12s ease,transform .12s ease;}
.journal-preview-pop.show{opacity:1;transform:translateY(0);}
.journal-preview-pop .hd{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
.journal-preview-pop .dt{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.04em;}
.journal-preview-pop .sub{font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}
.journal-preview-pop .pnl{font-size:16px;font-family:'IBM Plex Mono','SF Mono',monospace;font-weight:700;}
.journal-preview-pop .row{display:flex;justify-content:space-between;gap:8px;padding:4px 0;font-size:10px;border-top:1px solid var(--border);}
.journal-preview-pop .coach{margin-top:8px;padding:8px;border-radius:3px;background:rgba(41,98,255,.06);border:1px solid rgba(41,98,255,.15);font-size:10px;line-height:1.6;color:var(--text);}
.journal-preview-pop .coach strong{color:var(--blue);}
.journal-preview-pop .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.journal-preview-pop .tag-sm{padding:3px 7px;border-radius:2px;font-size:9px;font-weight:700;background:var(--surface2);border:1px solid var(--border);text-transform:uppercase;letter-spacing:.03em;}
.journal-suggestion-diff{margin-top:10px;padding:9px 12px;border-radius:4px;background:rgba(247,166,0,.06);border:1px solid rgba(247,166,0,.2);border-left:3px solid var(--amber);font-size:11px;color:var(--amber);line-height:1.7;}
.journal-suggestion-box{margin-top:10px;padding:12px;border-radius:4px;background:var(--surface);border:1px solid var(--border);}
.journal-suggestion-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px;}
@media(max-width:700px){.journal-suggestion-grid{grid-template-columns:1fr;}}
.journal-suggestion-item{padding:10px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);}
.journal-suggestion-item .k{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.journal-suggestion-item .v{font-size:12px;color:var(--text);line-height:1.6;}

.journal-selected-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px;}
.journal-selected-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.journal-selected-date{font-size:20px;font-weight:700;font-family:'IBM Plex Mono','SF Mono',monospace;line-height:1;letter-spacing:-.01em;}
.journal-selected-sub{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.04em;}
.journal-chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.journal-chip{padding:4px 9px;border-radius:3px;font-size:10px;font-weight:700;border:1px solid var(--border);background:var(--surface2);text-transform:uppercase;letter-spacing:.03em;}
.journal-data-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:10px;}
@media(max-width:640px){.journal-data-grid{grid-template-columns:1fr;}}
.journal-stat-box{padding:10px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);}
.journal-stat-box .k{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.journal-stat-box .v{font-size:20px;font-weight:700;font-family:'IBM Plex Mono','SF Mono',monospace;}
.journal-plan-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px;}
@media(max-width:1100px){.journal-plan-grid{grid-template-columns:1fr;}}
.journal-mini-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:13px;height:100%;}
.journal-linked-list{display:grid;gap:6px;}
.journal-linked-item{display:grid;grid-template-columns:72px 1fr auto auto;gap:8px;align-items:center;padding:8px 10px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);}
@media(max-width:700px){.journal-linked-item{grid-template-columns:60px 1fr;}.journal-linked-item .jl-right{grid-column:1 / -1;display:flex;justify-content:space-between;}}

.metric-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:3px;font-size:10px;font-weight:700;background:var(--surface2);border:1px solid var(--border);color:var(--text);text-transform:uppercase;letter-spacing:.03em;}
.small-note{font-size:11px;color:var(--muted);line-height:1.6;}

/* Cards */
.page-title{font-size:16px;font-weight:700;margin-bottom:4px;letter-spacing:-.01em;}
.page-sub{font-size:11px;color:var(--muted);margin-bottom:16px;text-transform:uppercase;letter-spacing:.04em;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px;}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:500px){.g4,.g3,.g2{grid-template-columns:1fr;}}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px;border-top:2px solid var(--border);}
.mc:hover{border-top-color:var(--accent);}
.mc .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.mc .val{font-size:20px;font-weight:700;font-family:'IBM Plex Mono','SF Mono',monospace;line-height:1.2;}
.mc .s{font-size:10px;color:var(--muted2);margin-top:3px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:10px;}
.card-title{font-size:13px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
.balance-card{border-radius:4px;padding:16px;margin-bottom:12px;border:1px solid;}
.balance-card.pos-card{background:rgba(38,166,154,.06);border-color:rgba(38,166,154,.3);}
.balance-card.neg-card{background:rgba(239,83,80,.06);border-color:rgba(239,83,80,.3);}
.big-num{font-size:30px;font-weight:700;font-family:'IBM Plex Mono','SF Mono',monospace;line-height:1;}

/* Table */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:10px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:6px 10px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border);background:var(--surface2);}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;font-variant-numeric:tabular-nums;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(41,98,255,.04);}
.badge{display:inline-block;padding:2px 6px;border-radius:2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
.b-long{background:rgba(38,166,154,.12);color:var(--green);border:1px solid rgba(38,166,154,.25);}
.b-short{background:rgba(239,83,80,.12);color:var(--red);border:1px solid rgba(239,83,80,.25);}
.b-eval{background:rgba(247,166,0,.12);color:var(--amber);border:1px solid rgba(247,166,0,.25);}
.b-funded{background:rgba(38,166,154,.12);color:var(--green);border:1px solid rgba(38,166,154,.25);}
.b-pa{background:rgba(66,165,245,.12);color:var(--blue);border:1px solid rgba(66,165,245,.25);}
.b-good{background:rgba(38,166,154,.12);color:var(--green);}
.b-bad{background:rgba(239,83,80,.12);color:var(--red);}
.b-mid{background:rgba(247,166,0,.12);color:var(--amber);}
.b-blue{background:rgba(66,165,245,.12);color:var(--blue);}
/* Compliance badges */
.b-compliant{background:rgba(38,166,154,.1);color:var(--green);border:1px solid rgba(38,166,154,.2);}
.b-suspected{background:rgba(247,166,0,.1);color:var(--amber);border:1px solid rgba(247,166,0,.2);}
.b-violation{background:rgba(239,83,80,.1);color:var(--red);border:1px solid rgba(239,83,80,.2);}
.del-btn{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:3px;}
.del-btn:hover{color:var(--red);background:rgba(239,83,80,.1);}

/* Progress */
.pbar{height:4px;border-radius:2px;background:var(--surface2);overflow:hidden;margin:5px 0;}
.pbar-f{height:100%;border-radius:2px;transition:width .4s;}
.pbar-lg{height:8px;border-radius:4px;background:var(--surface2);overflow:hidden;}
.pbar-lg-f{height:100%;border-radius:4px;transition:width .5s;}

/* Drawer */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;right:0;top:0;height:100vh;width:420px;max-width:96vw;background:var(--surface);border-left:1px solid var(--border);z-index:201;transform:translateX(100%);transition:transform .22s;overflow-y:auto;padding:18px;}
.drawer.open{transform:translateX(0);}
.drawer-title{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);}
.drawer-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:0;line-height:1;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.form-row.full{grid-template-columns:1fr;}
.form-row.t3{grid-template-columns:1fr 1fr 1fr;}
@media(max-width:500px){.form-row,.form-row.t3{grid-template-columns:1fr;}}
.fg label{display:block;font-size:9px;color:var(--muted);margin-bottom:3px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{width:100%;}
.form-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.form-section{font-size:9px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;margin:12px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.check-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);cursor:pointer;}
.check-row input{width:auto;accent-color:var(--accent);}

/* Alarm */
@keyframes alarm-pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,83,80,.3)}50%{box-shadow:0 0 0 8px rgba(239,83,80,0)}}
.alarm-box{border-radius:4px;padding:16px 20px;margin-bottom:12px;border:1px solid;text-align:center;}
.alarm-box.critical{background:rgba(239,83,80,.07);border-color:rgba(239,83,80,.4);animation:alarm-pulse 2s ease-out infinite;}
.alarm-box.warning{background:rgba(247,166,0,.06);border-color:rgba(247,166,0,.3);}
.alarm-box.safe{background:rgba(38,166,154,.06);border-color:rgba(38,166,154,.3);}
.alarm-icon{font-size:30px;margin-bottom:6px;display:block;}
.alarm-title{font-size:18px;font-weight:700;margin-bottom:3px;font-family:'IBM Plex Mono','SF Mono',monospace;}
.alarm-box.critical .alarm-title{color:var(--red);}
.alarm-box.warning .alarm-title{color:var(--amber);}
.alarm-box.safe .alarm-title{color:var(--green);}
.alarm-sub{font-size:12px;opacity:.8;line-height:1.75;}
.stop-badge{display:inline-block;margin-top:10px;padding:5px 18px;border-radius:3px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.alarm-box.critical .stop-badge{background:var(--red);color:#fff;}
.alarm-box.warning .stop-badge{background:var(--amber);color:#000;}

/* Risk meter */
.risk-meter{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:10px;}
.rm-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.rm-label{font-size:12px;font-weight:700;}
.rm-sub{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}
.rm-pct{font-size:18px;font-weight:700;font-family:'IBM Plex Mono','SF Mono',monospace;}
.rm-track{height:8px;border-radius:4px;overflow:hidden;background:var(--surface2);margin-bottom:4px;}
.rm-fill{height:100%;border-radius:4px;transition:width .5s;}
.rm-info{font-size:10px;color:var(--muted);display:flex;justify-content:space-between;}
.prot-restrictions{background:rgba(239,83,80,.05);border:1px solid rgba(239,83,80,.2);border-radius:4px;padding:12px;margin-bottom:10px;}
.prot-item{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid rgba(239,83,80,.06);font-size:11px;color:var(--text);}
.prot-item:last-child{border-bottom:none;}

/* Smart hint */
#smart-hint{display:none;background:rgba(232,160,32,.06);border:1px solid rgba(232,160,32,.2);border-left:3px solid var(--amber);border-radius:4px;padding:8px 12px;font-size:11px;color:var(--amber);margin-top:8px;line-height:1.6;}
/* Mobile Journal optimizations */
@media(max-width:768px){
  .journal-plan-grid{grid-template-columns:1fr!important;}
  .journal-top-layout{grid-template-columns:1fr!important;}
  .journal-data-grid{grid-template-columns:1fr 1fr!important;}
  .journal-day-cell{min-height:72px!important;padding:7px!important;}
  .journal-day-pnl{font-size:14px!important;}
  #content{padding:10px!important;padding-bottom:72px!important;}
  .form-row{grid-template-columns:1fr!important;}
  .journal-linked-item{grid-template-columns:52px 1fr!important;}
  textarea{font-size:16px!important;} /* prevent iOS zoom */
  input[type=text],input[type=number],input[type=date],select{font-size:16px!important;}
}
/* Compliance */
.comp-reasons{list-style:none;font-size:10px;color:var(--muted);line-height:1.8;margin-top:3px;}
.comp-reasons li{padding-left:12px;position:relative;}
.comp-reasons li::before{content:'›';position:absolute;left:0;color:var(--amber);}
.comp-reasons li.vio-li::before{color:var(--red);}
.conf-bar{height:2px;border-radius:1px;background:var(--surface2);overflow:hidden;width:60px;display:inline-block;vertical-align:middle;margin-left:5px;}
.conf-bar-fill{height:100%;border-radius:1px;}

/* Misc */
.srow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px;}
.srow:last-child{border-bottom:none;}
.empty{text-align:center;padding:3rem 0;color:var(--muted2);font-size:12px;}
.mono{font-family:'IBM Plex Mono','SF Mono',monospace;}
.pos{color:var(--green);}
.neg{color:var(--red);}
.amb{color:var(--amber);}
.tag{display:inline-block;padding:2px 7px;border-radius:2px;font-size:10px;background:var(--surface2);color:var(--muted);margin:2px;border:1px solid var(--border);}
#mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:50;padding:6px 0 env(safe-area-inset-bottom);}
@media(max-width:768px){#mobile-nav{display:flex;justify-content:space-around;}}
.mob-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;cursor:pointer;color:var(--muted);font-size:9px;background:none;border:none;flex:1;text-transform:uppercase;letter-spacing:.04em;}
.mob-btn.active{color:var(--accent);}
.mob-btn .mi{font-size:17px;}
#hamburger{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px;}
@media(max-width:768px){#hamburger{display:block;}}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.filter-btn{padding:3px 10px;font-size:10px;font-weight:700;border-radius:3px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.filter-btn.active{background:rgba(41,98,255,.15);border-color:rgba(41,98,255,.4);color:var(--accent);}

/* Auth */
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.auth-logo{font-size:22px;font-weight:700;letter-spacing:.06em;margin-bottom:5px;text-transform:uppercase;}
.auth-logo span{color:var(--accent);}
.auth-sub{font-size:11px;color:var(--muted);margin-bottom:1.8rem;text-transform:uppercase;letter-spacing:.06em;}
.auth-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:10px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);transition:all .12s;margin-bottom:8px;}
.auth-btn:hover{background:var(--border);border-color:var(--accent);}
.auth-btn svg{width:16px;height:16px;flex-shrink:0;}
.auth-err{font-size:11px;color:var(--red);margin-top:9px;min-height:16px;}
/* Performance Calendar — journal-style cells */
.perf-cal-month{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:10px;}
.perf-cal-month-title{font-size:10px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.perf-cal-month-title span{font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.perf-cal-week-hd{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.perf-cal-week-hd div{font-size:8px;color:var(--muted2);text-align:center;text-transform:uppercase;letter-spacing:.06em;padding-bottom:2px;}
.perf-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.perf-cal-day{position:relative;min-height:52px;border:1px solid var(--border);border-radius:3px;padding:4px 5px;cursor:default;overflow:hidden;transition:border-color .12s;}
.perf-cal-day:hover{border-color:rgba(59,108,248,.45);}
.perf-cal-day.is-today{border-color:rgba(59,108,248,.5);}
.perf-cal-day.is-empty{background:var(--surface2);}
.perf-cal-day .pd-num{font-size:9px;font-weight:600;color:var(--muted);line-height:1;}
.perf-cal-day .pd-pnl{font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;margin-top:5px;line-height:1.2;}
.perf-cal-day .pd-meta{font-size:9px;color:var(--muted2);margin-top:2px;}
.perf-cal-day.is-pad{border:none;background:transparent!important;min-height:0;}
/* cal-tip tooltip */
#cal-tip{position:fixed;z-index:600;pointer-events:none;background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--accent);border-radius:4px;padding:7px 11px;font-size:11px;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,.45);opacity:0;transition:opacity .1s;white-space:nowrap;line-height:1.7;}
#cal-tip.show{opacity:1;}
</style>
</head>

<script>
// ════ STATE ════
const S = { page:'roadmap', aid:null, accounts:[], trades:[], withdrawals:[], journalDays:[], missedTrades:[], journalDate:null, charts:{}, tradeFilter:'all', compFilter:'all', tradeSearch:'', tradeSession:'all', tradeSetup:'all', tradeQuality:'all', tradeShould:'all', tradeMacro:'all', tradeDateFrom:'', tradeDateTo:'', marketEvents:[], mktEventsLoaded:false, mktEventsLoading:false, mktEventsError:'', mktFilter:{ impacts:['High','Medium','Low','Holiday'], currencies:['USD','EUR','GBP','JPY','CNY','CAD','AUD','NZD','CHF'], types:['Growth','Inflation','Employment','Central Bank','Speeches','Bonds','Housing','Consumer Surveys','Business Surveys','Misc'], search:'', view:'week', filterPanelOpen:false } };
if(!window.CAL)window.CAL={};

// ══════════════════════════════════════════════════════════
// ════ TIME ENGINE — NY time · Killzones · ICT Macros ════
// ══════════════════════════════════════════════════════════
// All killzone/macro times are in NEW YORK time (America/New_York).
// Trades come in from the user's local input timezone (default Beijing).
// We convert → NY time, then classify into a killzone (session) and macro window.
const TIME_ENGINE = {
  settings: {
    inputTZ: 'Asia/Shanghai',      // source TZ of trade timestamps
    dstMode: 'auto',                // 'auto' | 'manual'
    londonDST: true,                // only used if dstMode === 'manual'
    nyDST: true,                    // only used if dstMode === 'manual'
    killzones: {
      'Asia':     { start:[20,0],  end:[24,0],  color:'#3b6cf8', enabled:true },
      'London':   { start:[2,0],   end:[5,0],   color:'#94a3b8', enabled:true },
      'NY AM':    { start:[9,30],  end:[11,0],  color:'#2bab85', enabled:true },
      'NY Lunch': { start:[12,0],  end:[13,0],  color:'#e8a020', enabled:true },
      'NY PM':    { start:[13,30], end:[16,0],  color:'#a855f7', enabled:true }
    },
    macros: [
      { id:'ldn_0233', name:'London 02:33', start:[2,33],  end:[3,0],   kind:'london', enabled:true },
      { id:'ldn_0403', name:'London 04:03', start:[4,3],   end:[4,30],  kind:'london', enabled:true },
      { id:'ny_0850',  name:'NY 08:50',     start:[8,50],  end:[9,10],  kind:'ny',     enabled:true },
      { id:'ny_0950',  name:'NY 09:50',     start:[9,50],  end:[10,10], kind:'ny',     enabled:true },
      { id:'ny_1050',  name:'NY 10:50',     start:[10,50], end:[11,10], kind:'ny',     enabled:true },
      { id:'ny_1150',  name:'NY 11:50 Launch', start:[11,50], end:[12,10], kind:'ny', enabled:true },
      { id:'ny_1310',  name:'NY 13:10',     start:[13,10], end:[13,40], kind:'ny',     enabled:true },
      { id:'ny_1515',  name:'NY 15:15',     start:[15,15], end:[15,45], kind:'ny',     enabled:true }
    ]
  },
  load(){
    try{
      const saved = localStorage.getItem('pg_time_settings');
      if(saved){
        const parsed = JSON.parse(saved);
        // merge carefully so new macros added in updates don't disappear
        if(parsed.inputTZ) this.settings.inputTZ = parsed.inputTZ;
        if(parsed.dstMode) this.settings.dstMode = parsed.dstMode;
        if(typeof parsed.londonDST==='boolean') this.settings.londonDST = parsed.londonDST;
        if(typeof parsed.nyDST==='boolean') this.settings.nyDST = parsed.nyDST;
        if(parsed.killzones){
          Object.keys(parsed.killzones).forEach(k=>{
            if(this.settings.killzones[k]) Object.assign(this.settings.killzones[k], parsed.killzones[k]);
          });
        }
        if(Array.isArray(parsed.macros)){
          parsed.macros.forEach(m=>{
            const idx = this.settings.macros.findIndex(x=>x.id===m.id);
            if(idx>=0) this.settings.macros[idx] = {...this.settings.macros[idx], ...m};
          });
        }
      }
    }catch(e){}
  },
  save(){
    try{ localStorage.setItem('pg_time_settings', JSON.stringify(this.settings)); }catch(e){}
  },
  // UTC offset (in minutes) for a given timezone at a specific wall-clock moment.
  // Uses Intl which always respects DST rules for the named zone.
  _tzOffsetMin(tz, y, mo, d, h, mi){
    const utcMs = Date.UTC(y, mo-1, d, h, mi);
    const probe = new Date(utcMs);
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit',
      hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
    }).formatToParts(probe);
    const get = t => parseInt(parts.find(p=>p.type===t)?.value||'0',10);
    const asLocalMs = Date.UTC(get('year'), get('month')-1, get('day'), get('hour')%24, get('minute'), get('second'));
    return (asLocalMs - utcMs) / 60000;
  },
  // Is NY currently in DST (EDT = -4) or standard (EST = -5)?
  _isDSTInNY(utcMs){
    const offset = (new Date(utcMs).getTimezoneOffset === undefined) ? 0
      : -this._tzOffsetMin('America/New_York',
          new Date(utcMs).getUTCFullYear(),
          new Date(utcMs).getUTCMonth()+1,
          new Date(utcMs).getUTCDate(),
          new Date(utcMs).getUTCHours(),
          new Date(utcMs).getUTCMinutes());
    return offset === 240; // 4 hour offset = EDT = DST
  },
  // Convert a user-entered date (YYYY-MM-DD) + time (HH:MM) assumed to be in
  // TIME_ENGINE.settings.inputTZ into the equivalent wall clock in America/New_York.
  // Returns {year,month,day,hour,minute,totalMinutes,dateStr,timeStr,utcMs} or null.
  toNY(dateStr, timeStr){
    if(!dateStr) return null;
    try{
      const parts = String(dateStr).split('-');
      if(parts.length<3) return null;
      const y=+parts[0], mo=+parts[1], d=+parts[2];
      let h=0, mi=0;
      if(timeStr){
        const tm = String(timeStr).match(/(\d{1,2}):(\d{2})/);
        if(tm){ h=+tm[1]; mi=+tm[2]; }
      }
      const srcTZ = this.settings.inputTZ || 'Asia/Shanghai';
      const srcOffset = this._tzOffsetMin(srcTZ, y, mo, d, h, mi);
      const utcMs = Date.UTC(y, mo-1, d, h, mi) - srcOffset*60000;
      // NY wall clock
      let nyOffset = this._tzOffsetMin('America/New_York', y, mo, d, h, mi);
      // Manual DST override: if user says NY DST is off but Intl says it's on, shift -60
      if(this.settings.dstMode==='manual'){
        const intlNYOffset = this._tzOffsetMin('America/New_York', y, mo, d, h, mi);
        const intlSaysDST = Math.abs(intlNYOffset) === 240;
        if(this.settings.nyDST && !intlSaysDST) nyOffset = -240;
        else if(!this.settings.nyDST && intlSaysDST) nyOffset = -300;
      }
      const nyWallMs = utcMs + nyOffset*60000;
      const nyDate = new Date(nyWallMs);
      const Y = nyDate.getUTCFullYear();
      const M = nyDate.getUTCMonth()+1;
      const D = nyDate.getUTCDate();
      const H = nyDate.getUTCHours();
      const Mi= nyDate.getUTCMinutes();
      return {
        year:Y, month:M, day:D, hour:H, minute:Mi,
        totalMinutes: H*60+Mi,
        dateStr: `${Y}-${String(M).padStart(2,'0')}-${String(D).padStart(2,'0')}`,
        timeStr: `${String(H).padStart(2,'0')}:${String(Mi).padStart(2,'0')}`,
        utcMs
      };
    }catch(e){ return null; }
  },
  // Convert an ISO timestamp string (e.g. "2026-04-22T09:30:00" or with Z or offset).
  // If no TZ info is present in the string, treat as inputTZ.
  fromISO(iso){
    if(!iso) return null;
    const trimmed = String(iso).trim();
    // Has explicit TZ info?
    if(/Z|[+-]\d{2}:?\d{2}$/.test(trimmed)){
      try{
        const d = new Date(trimmed);
        if(isNaN(d)) return null;
        const utcMs = d.getTime();
        // format into NY wall clock
        const parts = new Intl.DateTimeFormat('en-CA',{
          timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit',
          hour:'2-digit',minute:'2-digit',hour12:false
        }).formatToParts(d);
        const g = t => parts.find(p=>p.type===t)?.value||'0';
        const Y=+g('year'), M=+g('month'), D=+g('day');
        const H=(+g('hour'))%24, Mi=+g('minute');
        return {
          year:Y,month:M,day:D,hour:H,minute:Mi,
          totalMinutes: H*60+Mi,
          dateStr:`${Y}-${String(M).padStart(2,'0')}-${String(D).padStart(2,'0')}`,
          timeStr:`${String(H).padStart(2,'0')}:${String(Mi).padStart(2,'0')}`,
          utcMs
        };
      }catch(e){ return null; }
    }
    // No TZ — parse naive parts
    const m = trimmed.match(/^(\d{4})-(\d{2})-(\d{2})[T\s](\d{1,2}):(\d{2})/);
    if(!m) return null;
    return this.toNY(`${m[1]}-${m[2]}-${m[3]}`, `${m[4]}:${m[5]}`);
  },
  // Classify a NY time object into a killzone (session) name
  detectKillzone(ny){
    if(!ny) return 'Other';
    const mins = ny.totalMinutes;
    const zones = this.settings.killzones;
    for(const name of Object.keys(zones)){
      const z = zones[name];
      if(z.enabled===false) continue;
      const sM = z.start[0]*60 + z.start[1];
      const eM = z.end[0]*60 + z.end[1];
      if(eM > sM){
        if(mins >= sM && mins < eM) return name;
      } else {
        // wraps midnight (Asia 20:00 → 24:00 doesn't wrap, but allow if someone customises)
        if(mins >= sM || mins < eM) return name;
      }
    }
    return 'Other';
  },
  // Returns macro window name (string) or null
  detectMacro(ny){
    if(!ny) return null;
    const mins = ny.totalMinutes;
    for(const m of this.settings.macros){
      if(m.enabled===false) continue;
      let sM = m.start[0]*60 + m.start[1];
      let eM = m.end[0]*60 + m.end[1];
      // DST manual override for London-kind macros
      if(this.settings.dstMode==='manual' && m.kind==='london'){
        // London macros are specified in NY time in the indicator; if London DST and NY DST
        // diverge for a week (rare window in March/November), the London macros shift.
        // This is subtle and most users should keep dstMode=auto. We intentionally don't
        // do an extra shift here because we already convert the trade to NY time.
      }
      if(mins >= sM && mins < eM) return m.name;
    }
    return null;
  },
  // Is a given NY time inside ANY killzone? Returns the killzone config or null.
  killzoneInfo(name){
    return this.settings.killzones[name] || null;
  },
  macroInfo(name){
    return this.settings.macros.find(m=>m.name===name) || null;
  },
  // Classify a trade (stored date/time are assumed to be in settings.inputTZ).
  classifyTrade(dateStr, timeStr){
    const ny = this.toNY(dateStr, timeStr);
    if(!ny) return {session:'Other', macro:null, ny:null};
    return {
      session: this.detectKillzone(ny),
      macro: this.detectMacro(ny),
      ny
    };
  },
  // Get current NY time info
  nowNY(){
    const d = new Date();
    const parts = new Intl.DateTimeFormat('en-CA',{
      timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit',
      hour:'2-digit',minute:'2-digit',hour12:false
    }).formatToParts(d);
    const g = t => parts.find(p=>p.type===t)?.value||'0';
    const Y=+g('year'), M=+g('month'), D=+g('day');
    const H=(+g('hour'))%24, Mi=+g('minute');
    return {
      year:Y,month:M,day:D,hour:H,minute:Mi,
      totalMinutes:H*60+Mi,
      dateStr:`${Y}-${String(M).padStart(2,'0')}-${String(D).padStart(2,'0')}`,
      timeStr:`${String(H).padStart(2,'0')}:${String(Mi).padStart(2,'0')}`
    };
  },
  // Is a macro currently active right now in NY time?
  currentActiveMacro(){
    const ny = this.nowNY();
    return this.detectMacro(ny);
  },
  // Next upcoming macro today (or tomorrow if none left today)
  nextMacroToday(){
    const ny = this.nowNY();
    const mins = ny.totalMinutes;
    const enabled = this.settings.macros.filter(m=>m.enabled!==false);
    const upcoming = enabled.filter(m => (m.start[0]*60+m.start[1]) > mins)
      .sort((a,b)=>(a.start[0]*60+a.start[1]) - (b.start[0]*60+b.start[1]));
    if(upcoming.length) return { macro: upcoming[0], today:true };
    // tomorrow = earliest macro
    const earliest = [...enabled].sort((a,b)=>(a.start[0]*60+a.start[1]) - (b.start[0]*60+b.start[1]))[0];
    return earliest ? { macro: earliest, today:false } : null;
  }
};

function emptySessionMap(){ return {Asia:0,London:0,'NY AM':0,'NY Lunch':0,'NY PM':0,Other:0}; }

// ════ MARKET CALENDAR — ForexFactory + Jin10 + manual ════
// ══════════════════════════════════════════════════════════
// Browser-friendly approach: try direct fetch first, fall back to CORS proxies.
// The ForexFactory XML feed (https://nfs.faireconomy.media/ff_calendar_thisweek.xml)
// is publicly used by MT4 news indicators and exposes week-ahead events.
// Jin10 has no open browser API; we attempt through a proxy and fall back to
// manual entry (stored in Firestore collection 'market_events').
const MKT_CAL = {
  FF_URLS: [
    'https://nfs.faireconomy.media/ff_calendar_thisweek.xml',
    'https://cdn-nfs.faireconomy.media/ff_calendar_thisweek.xml'
  ],
  // Optional: next week URL for richer planning ("more news")
  FF_URLS_NEXT: [
    'https://nfs.faireconomy.media/ff_calendar_nextweek.xml',
    'https://cdn-nfs.faireconomy.media/ff_calendar_nextweek.xml'
  ],
  PROXIES: [
    u => 'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
    u => 'https://corsproxy.io/?'+encodeURIComponent(u)
  ],
  // Fetch a URL via several strategies; return text on success.
  async fetchWithFallback(url, timeoutMs=12000){
    const tryOnce = async (target) => {
      const ctrl = new AbortController();
      const t = setTimeout(()=>ctrl.abort(), timeoutMs);
      try{
        const r = await fetch(target, {signal: ctrl.signal, cache:'no-store'});
        if(!r.ok) throw new Error('HTTP '+r.status);
        return await r.text();
      } finally { clearTimeout(t); }
    };
    // Direct first
    try { return await tryOnce(url); } catch(e1) {
      for(const proxy of this.PROXIES){
        try { return await tryOnce(proxy(url)); } catch(e2) { /* try next */ }
      }
      throw new Error('fetch-failed');
    }
  },
  // Parse ForexFactory XML into a normalised event list.
  parseFFXML(xmlText){
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'text/xml');
    const evs = Array.from(doc.getElementsByTagName('event'));
    return evs.map(ev=>{
      const get = tag => ev.getElementsByTagName(tag)[0]?.textContent?.trim() || '';
      const title    = get('title');
      const country  = get('country');
      const dateRaw  = get('date');      // m-dd-yyyy  — in FF's server zone (Eastern)
      const timeRaw  = get('time');      // h:mmam/pm or "All Day"
      const impact   = get('impact');    // High / Medium / Low / Holiday
      const forecast = get('forecast');
      const previous = get('previous');
      // ── Parse the source date in FF Eastern Time ──
      const md = dateRaw.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
      if(!md) return null;
      const srcMonth = +md[1], srcDay = +md[2], srcYear = +md[3];
      // ── Parse the source time ──
      let srcHour = 0, srcMin = 0, isAllDay = true;
      if(/^\d{1,2}:\d{2}/.test(timeRaw)){
        const tm = timeRaw.match(/^(\d{1,2}):(\d{2})\s*(am|pm)?/i);
        if(tm){
          let h = +tm[1]; const m = +tm[2]; const ap = (tm[3]||'').toLowerCase();
          if(ap==='pm' && h<12) h+=12;
          if(ap==='am' && h===12) h=0;
          srcHour = h; srcMin = m; isAllDay = false;
        }
      }
      // ── Convert FF Eastern wall-clock time → absolute UTC ms ──
      // The FF XML feed is fixed in US/Eastern (with DST). We compute the UTC
      // instant for that wall-clock by querying the Eastern offset for that moment.
      // (Reuses TIME_ENGINE._tzOffsetMin which knows DST.)
      const tzMin = TIME_ENGINE._tzOffsetMin('America/New_York', srcYear, srcMonth, srcDay, srcHour, srcMin);
      const utcMs = Date.UTC(srcYear, srcMonth-1, srcDay, srcHour, srcMin) - tzMin*60000;
      // ── Convert UTC → display timezone (user's browser local by default,
      //    or whatever they pick in MKT_CAL.displayTZ) ──
      const dispTZ = MKT_CAL.getDisplayTZ();
      const disp = MKT_CAL._wallClockInTZ(utcMs, dispTZ);
      const dispDate = `${disp.year}-${String(disp.month).padStart(2,'0')}-${String(disp.day).padStart(2,'0')}`;
      const dispTime = isAllDay ? '' : `${String(disp.hour).padStart(2,'0')}:${String(disp.minute).padStart(2,'0')}`;
      // Original Eastern fields — kept for tooltip / debugging
      const srcDateStr = `${srcYear}-${String(srcMonth).padStart(2,'0')}-${String(srcDay).padStart(2,'0')}`;
      const srcTimeStr = isAllDay ? '' : `${String(srcHour).padStart(2,'0')}:${String(srcMin).padStart(2,'0')}`;
      const ev2 = {
        id: 'ff_'+srcDateStr+'_'+srcTimeStr+'_'+title.slice(0,40).replace(/\W+/g,'_'),
        source:'forexfactory',
        title, country, impact: impact||'Low',
        // Display fields — used everywhere for grouping / showing / sorting
        date: dispDate,
        timeNY: dispTime,           // Field name kept for backward compat; semantically = "display time"
        // Source fields — keep for re-conversion when user changes display TZ
        srcDate: srcDateStr,
        srcTime: srcTimeStr,
        srcTZ: 'America/New_York',
        utcMs,                      // Absolute timestamp — the source of truth
        forecast, previous, notes:''
      };
      ev2.eventType = MKT_CAL.categorize(ev2);
      ev2.isSpeech  = MKT_CAL.isSpeech(ev2);
      return ev2;
    }).filter(e=>e && e.date);
  },
  // Get the user's currently selected display timezone (defaults to browser local).
  getDisplayTZ(){
    if(MKT_CAL._displayTZOverride) return MKT_CAL._displayTZOverride;
    try{
      const saved = localStorage.getItem('pg_mkt_displayTZ');
      if(saved) return saved;
    }catch(e){}
    try{ return Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/New_York'; }
    catch(e){ return 'America/New_York'; }
  },
  setDisplayTZ(tz){
    MKT_CAL._displayTZOverride = tz;
    try{ localStorage.setItem('pg_mkt_displayTZ', tz); }catch(e){}
    // Re-project all events for the new TZ
    MKT_CAL.reprojectEvents();
  },
  // Compute wall clock {year,month,day,hour,minute} for an absolute UTC ms in given tz.
  _wallClockInTZ(utcMs, tz){
    const parts = new Intl.DateTimeFormat('en-CA',{
      timeZone: tz,
      year:'numeric',month:'2-digit',day:'2-digit',
      hour:'2-digit',minute:'2-digit',hour12:false
    }).formatToParts(new Date(utcMs));
    const g = t => parts.find(p=>p.type===t)?.value || '0';
    return { year:+g('year'), month:+g('month'), day:+g('day'),
             hour:(+g('hour'))%24, minute:+g('minute') };
  },
  // Re-project all events' display date/time fields based on current display TZ.
  // Called when user changes display TZ in settings.
  reprojectEvents(){
    if(!Array.isArray(S.marketEvents)) return;
    const dispTZ = MKT_CAL.getDisplayTZ();
    S.marketEvents.forEach(ev=>{
      if(!ev.utcMs){
        // Manual events without utcMs: synthesise from existing date+timeNY
        // (assume user typed them as ET when adding manually)
        if(ev.date){
          const m = ev.date.match(/^(\d{4})-(\d{2})-(\d{2})$/);
          if(m){
            const y=+m[1], mo=+m[2], d=+m[3];
            let h=0, mi=0;
            const tm = (ev.timeNY||'').match(/^(\d{1,2}):(\d{2})/);
            if(tm){ h=+tm[1]; mi=+tm[2]; }
            const off = TIME_ENGINE._tzOffsetMin('America/New_York', y, mo, d, h, mi);
            ev.utcMs = Date.UTC(y, mo-1, d, h, mi) - off*60000;
            ev.srcDate = ev.date;
            ev.srcTime = ev.timeNY||'';
            ev.srcTZ   = 'America/New_York';
          }
        }
      }
      if(ev.utcMs){
        const disp = MKT_CAL._wallClockInTZ(ev.utcMs, dispTZ);
        ev.date   = `${disp.year}-${String(disp.month).padStart(2,'0')}-${String(disp.day).padStart(2,'0')}`;
        ev.timeNY = (ev.srcTime || ev.timeNY) ? `${String(disp.hour).padStart(2,'0')}:${String(disp.minute).padStart(2,'0')}` : '';
      }
    });
  },
  // Auto-classify event into a category based on title keywords.
  // Used for the "Event Types" filter panel (matches FF / Lucid taxonomy).
  categorize(ev){
    const t = (ev.title||'').toLowerCase();
    if(/cpi|ppi|inflation|pce|core price|trimmed|median cpi/.test(t)) return 'Inflation';
    if(/non-?farm|nfp|payroll|unemploy|jobless|employ|jolts|adp|wage|earnings|claimant/.test(t)) return 'Employment';
    if(/gdp|growth|industrial production|manufacturing prod/.test(t)) return 'Growth';
    if(/rate decision|interest rate|fomc|fed|ecb|boe|boj|snb|rba|rbnz|boc|loan prime|monetary policy|press conf|chairman|chairwoman|chair|governor|president speak|speaks|testif|minutes|statement|symposium|jackson hole/.test(t)) return 'Central Bank';
    if(/speech|speak|testif|press conf|address|remarks|panel/.test(t)) return 'Speeches';
    if(/bond|auction|treasury|yield|debt issu/.test(t)) return 'Bonds';
    if(/housing|home sales|building permits|mortgage|construction|hpi|rightmove/.test(t)) return 'Housing';
    if(/consumer confidence|consumer sentiment|consumer surveys|michigan|conf board/.test(t)) return 'Consumer Surveys';
    if(/business confidence|business surveys|pmi|ism|tankan|zew|ifo|nzier/.test(t)) return 'Business Surveys';
    return 'Misc';
  },
  // Detect "Fed speak" / central banker speeches / testimonies — explicitly flagged
  // even when categorized under Central Bank.
  isSpeech(ev){
    const t = (ev.title||'').toLowerCase();
    return /\b(speak|speaks|speech|testif|press conf|address|remarks|panel|symposium|jackson hole)\b/.test(t);
  },
  // Score a single event for trading risk (0-100, higher = riskier)
  eventRisk(ev){
    const title = (ev.title||'').toLowerCase();
    let score = 0;
    const imp = (ev.impact||'').toLowerCase();
    if(imp==='high' || imp==='红' || ev.impact==='★★★') score = 75;
    else if(imp==='medium' || imp==='orange' || ev.impact==='★★') score = 45;
    else if(imp==='holiday') score = 30;
    else score = 18;
    // Extra bumps for well-known market-movers
    const killers = ['fomc','cpi','non-farm','nonfarm','nfp','pce','gdp','fed chair','fed chairman','powell','interest rate','rate decision','unemployment','payroll','retail sales'];
    if(killers.some(k=>title.includes(k))) score += 20;
    // Speeches by Fed Chair / ECB Pres are specifically destabilizing
    if(MKT_CAL.isSpeech(ev) && /(chair|chairman|chairwoman|powell|lagarde|bailey|ueda|macklem)/.test(title)) score += 12;
    // USD events hit index futures hardest
    if((ev.country||'').toUpperCase()==='USD') score += 5;
    return Math.min(100, score);
  },
  // Aggregate all events for a given NY date into a risk summary
  dayRiskSummary(dateStr, allEvents){
    const list = allEvents.filter(e=>e.date===dateStr);
    if(!list.length) return { dateStr, count:0, maxRisk:0, highCount:0, items:[], note:'无重要事件' };
    const scored = list.map(e=>({...e, risk:this.eventRisk(e)}));
    scored.sort((a,b)=>b.risk-a.risk);
    const high = scored.filter(e=>e.risk>=60).length;
    const med = scored.filter(e=>e.risk>=40 && e.risk<60).length;
    const speechHigh = scored.filter(e=>MKT_CAL.isSpeech(e) && e.risk>=55).length;
    let note;
    if(high>=2) note = '⚠ 多个高影响事件，回避窗口前后交易';
    else if(high===1) note = '⚠ 1 个高影响事件，严格回避公布前后 10 分钟';
    else if(speechHigh>=1) note = '🎤 央行讲话日，注意盘中波动';
    else if(med>=1) note = '中等事件，注意波动';
    else note = '低影响事件';
    return {
      dateStr,
      count:list.length,
      maxRisk: scored[0].risk,
      highCount: high,
      medCount: med,
      speechCount: speechHigh,
      items: scored,
      note
    };
  },
  // ── Apply user filters ──
  applyFilters(events){
    const f = S.mktFilter || {};
    const impacts = new Set(f.impacts||[]);
    const currs   = new Set((f.currencies||[]).map(s=>s.toUpperCase()));
    const types   = new Set(f.types||[]);
    const search  = (f.search||'').toLowerCase().trim();
    return events.filter(e=>{
      if(impacts.size && !impacts.has(e.impact)) return false;
      const c = (e.country||'').toUpperCase();
      if(c && currs.size && !currs.has(c)) return false;
      const t = e.eventType || MKT_CAL.categorize(e);
      if(types.size && !types.has(t)) return false;
      if(search && !(e.title||'').toLowerCase().includes(search)) return false;
      return true;
    });
  },
  // ── Weekly analyzer ──
  // Looks at ALL events for the current week (Mon-Fri based on the user's display
  // timezone), produces:
  //  - red event list, orange event list, speech list
  //  - daily risk score per day
  //  - summary verdict + concrete trading recommendations
  // Sorting is by absolute UTC timestamp so order matches reality regardless of
  // which timezone events were originally given in.
  weeklyAnalysis(events){
    // "Today" in the user's chosen display TZ — this drives week boundaries
    // so the calendar matches what the user sees on their clock.
    const dispTZ = MKT_CAL.getDisplayTZ();
    const nowDisp = MKT_CAL._wallClockInTZ(Date.now(), dispTZ);
    const todayStr = `${nowDisp.year}-${String(nowDisp.month).padStart(2,'0')}-${String(nowDisp.day).padStart(2,'0')}`;
    const today = new Date(todayStr+'T12:00:00');
    const dow = today.getUTCDay() || 7;     // Sunday = 0 → 7
    const monday = new Date(today);
    monday.setUTCDate(today.getUTCDate() - (dow-1));
    const days = [];
    for(let i=0;i<7;i++){
      const d = new Date(monday);
      d.setUTCDate(monday.getUTCDate()+i);
      days.push(d.toISOString().slice(0,10));
    }
    const weekEvents = events.filter(e => days.includes(e.date));
    // Sort by absolute UTC ms when available; fall back to display date+time
    const sortByMs = (a,b) => {
      if(a.utcMs && b.utcMs) return a.utcMs - b.utcMs;
      return (`${a.date}${a.timeNY||'99'}`).localeCompare(`${b.date}${b.timeNY||'99'}`);
    };
    const reds   = weekEvents.filter(e=>(e.impact||'').toLowerCase()==='high').sort(sortByMs);
    const oranges= weekEvents.filter(e=>(e.impact||'').toLowerCase()==='medium').sort(sortByMs);
    const speeches = weekEvents.filter(e=>MKT_CAL.isSpeech(e)).sort(sortByMs);
    const holidays = weekEvents.filter(e=>(e.impact||'').toLowerCase()==='holiday');
    // Per-day analysis
    const perDay = days.map(dateStr=>{
      const summary = MKT_CAL.dayRiskSummary(dateStr, events);
      const ev = weekEvents.filter(e=>e.date===dateStr);
      const r = ev.filter(e=>(e.impact||'').toLowerCase()==='high');
      const o = ev.filter(e=>(e.impact||'').toLowerCase()==='medium');
      const sp= ev.filter(e=>MKT_CAL.isSpeech(e));
      // Per-day recommendation
      let level = 'safe';     // safe / caution / danger
      let advice = '可按计划执行 — 当天无重要风险事件，建议执行 A+/A 级 setup。';
      if(r.length>=2){ level='danger'; advice = `🚨 ${r.length} 条红色事件，建议事件前后各 15 分钟内不交易，或当日只用最小手数试探。`; }
      else if(r.length===1){ level='danger'; advice = `🚨 1 条红色事件 (${r[0].timeNY||'--:--'} ${r[0].title})，公布前后严格回避 10 分钟。`; }
      else if(sp.some(e=>/(chair|powell|lagarde|bailey|ueda)/i.test(e.title))){ level='caution'; advice = `🎤 重磅央行讲话日 — 减仓观望，等讲话基调确认后再决定方向。`; }
      else if(o.length>=2){ level='caution'; advice = `⚠ ${o.length} 条橙色事件聚集，建议缩仓 50%，避开公布前 5 分钟。`; }
      else if(o.length===1){ level='caution'; advice = `⚠ 1 条橙色事件 (${o[0].timeNY||'--:--'} ${o[0].title})，关注其后的盘中波动。`; }
      else if(holidays.some(h=>h.date===dateStr)){ level='caution'; advice = `🏖 假期日，流动性偏低，避免做大头寸。`; }
      return { dateStr, summary, reds:r, oranges:o, speeches:sp, level, advice };
    });
    // Weekly verdict
    const totalRed = reds.length, totalOrange = oranges.length, totalSpeech = speeches.length;
    const dangerDays = perDay.filter(d=>d.level==='danger').length;
    const cautionDays= perDay.filter(d=>d.level==='caution').length;
    let weekLevel = 'safe';
    let headline = '本周风险偏低 — 可按计划执行';
    let weekAdvice = '本周无明显高风险事件，可正常执行交易计划，按平时风险敞口操作。';
    if(dangerDays>=3 || totalRed>=4){
      weekLevel='danger';
      headline=`🚨 高风险周 — ${totalRed} 条红色事件分布于 ${dangerDays} 天`;
      weekAdvice = `本周高风险事件密集 (${totalRed} 红 / ${totalOrange} 橙)。建议：① 整周仅做 A+ setup；② 单笔风险减半；③ 事件公布前后 15 分钟内不开仓；④ 周累计亏损达到日亏损上限的 2 倍直接收手。`;
    } else if(dangerDays>=1 || totalRed>=2){
      weekLevel='caution';
      headline=`⚠ 中等风险周 — 注意 ${dangerDays} 个高风险日`;
      weekAdvice = `本周有 ${totalRed} 条红色事件，重点关注高风险日。建议：① 高风险日只在事件后入场；② 央行讲话前后 30 分钟回避；③ 保持正常单笔风险但减少日内笔数。`;
    } else if(cautionDays>=2 || totalOrange>=3){
      weekLevel='caution';
      headline=`⚠ 中等风险周 — ${totalOrange} 条橙色事件需关注`;
      weekAdvice = `本周以橙色事件为主，整体波动可控。建议正常执行计划，仅在事件公布前 10 分钟回避。`;
    }
    // Top 3 most dangerous events of the week
    const allScored = weekEvents.map(e=>({...e, risk:MKT_CAL.eventRisk(e)})).sort((a,b)=>b.risk-a.risk);
    const top3 = allScored.slice(0,3);
    return {
      weekDays: days,
      weekEvents,
      reds, oranges, speeches, holidays,
      perDay,
      weekLevel, headline, weekAdvice,
      counts: { red:totalRed, orange:totalOrange, speech:totalSpeech, holiday:holidays.length, total:weekEvents.length },
      top3
    };
  }
};

function expectancyForTrades(arr){
  if(!arr.length) return 0;
  const wins=arr.filter(t=>(t.pnl||0)>0), losses=arr.filter(t=>(t.pnl||0)<0);
  const wr=wins.length/arr.length, lr=losses.length/arr.length;
  const avgWin=wins.length?wins.reduce((s,t)=>s+(t.pnl||0),0)/wins.length:0;
  const avgLoss=losses.length?Math.abs(losses.reduce((s,t)=>s+(t.pnl||0),0)/losses.length):0;
  return wr*avgWin-lr*avgLoss;
}
function calcAccountGuard(ac){
  if(!ac) return {status:'ok', message:'', blocks:[]};
  const s=calcS(ac.id), r=ac.rules||{}, today=new Date().toISOString().slice(0,10);
  const todayTrades=gtr(ac.id).filter(t=>t.date===today);
  const violations=todayTrades.filter(t=>t.compliance?.status==='violation').length;
  const highRisk=todayTrades.filter(t=>t.riskLabel==='high').length;
  const todayLoss=Math.max(0,-(s?.todayPnl||0));
  const dailyPct=r.daily>0?todayLoss/r.daily*100:0;
  const ddPct=r.maxDD>0?(s?.ddU||0)/r.maxDD*100:0;
  const blocks=[];
  if(ac.status==='disabled') blocks.push('账户已被手动禁用');
  if(violations>=2) blocks.push('当日已出现 2 笔违规');
  if(highRisk>=3) blocks.push('当日高风险单过多');
  if(r.maxTradesPerDay>0 && todayTrades.length>=r.maxTradesPerDay) blocks.push('今日已达最大笔数');
  if(dailyPct>=90) blocks.push('接近日亏极限');
  if(ddPct>=90) blocks.push('接近总回撤极限');
  const status=blocks.length?'blocked':(dailyPct>=65||violations>=1||highRisk>=2?'caution':'ok');
  return {status, message:blocks[0]||'', blocks, dailyPct, ddPct, violations, highRisk, todayTrades:todayTrades.length};
}

function computeExecFromTrades(trades){
  if(!trades || !trades.length) return 100;
  const planned = trades.filter(t=>t.followPlan!==false).length;

  const revengeCount = trades.filter(t=>t.revenge===true).length;
  const fomoCount = trades.filter(t=>t.fomo===true).length;
  return Math.round((planned/trades.length)*40+(slOk/trades.length)*30+((trades.length-revengeCount)/trades.length)*15+((trades.length-fomoCount)/trades.length)*15);
}
function calcRecentDailySummary(ac){
  const tr = gtr(ac.id);

  });
}
function calcAccountStateMachine(ac){

  );

  let state='normal', reason='系统状态正常', color='var(--green)', restrictions=[], progress=100;

  return {state,label:state==='normal'?'正常':state==='restricted'?'限制':state==='frozen'?'冻结':'恢复中',color,reason,restrictions,progress,dailyPct,ddPct,consLossToday,todaySummary,cleanRecent,hadRecentStress};
}
function calcBehaviorBias(ac){
  const today = new Date().toISOString().slice(0,10);
  const trades = gtr(ac.id).filter(t=>t.date===today);
  const todayJournal = gj(today) || null;
  const planSession = todayJournal?.sessionFocus || '';
  const planSetup = todayJournal?.setupFocus || '';
  const metrics = {
    overtrade: 0,
    revenge: trades.filter(t=>t.revenge).length,
    fomo: trades.filter(t=>t.fomo).length,
    early: trades.filter(t=>['Asia','Other'].includes(t.session||autoSession(t.date,t.time||''))).length,
    shouldNot: trades.filter(t=>t.shouldTrade==='no').length,
    qualityC: trades.filter(t=>t.tradeQuality==='C').length,
    offPlanSession: planSession ? trades.filter(t=>(t.session||'')!==planSession).length : 0,
    offPlanSetup: planSetup ? trades.filter(t=>(t.setup||'')!==planSetup).length : 0,
    noPlan: trades.filter(t=>t.followPlan===false).length,
    violations: trades.filter(t=>t.compliance?.status==='violation').length
  };
  const maxTrades = todayJournal?.maxTrades || ac.rules?.maxTradesPerDay || 0;
  metrics.overtrade = maxTrades>0 ? Math.max(0, trades.length-maxTrades) : 0;
  metrics.totalFlags = Object.values(metrics).reduce((s,v)=>s+(+v||0),0);
  metrics.score = Math.max(0, 100 - (
    metrics.overtrade*16 + metrics.revenge*18 + metrics.fomo*14 + metrics.early*8 +
    metrics.shouldNot*18 + metrics.qualityC*12 + metrics.offPlanSession*8 +
    metrics.offPlanSetup*8 + metrics.noPlan*10 + metrics.violations*20
  ));
  return metrics;
}
function calcPlanVsActual(ac){
  const today = new Date().toISOString().slice(0,10);
  const journal = gj(today) || {};
  const trades = gtr(ac.id).filter(t=>t.date===today);
  const actualSessions = [...new Set(trades.map(t=>t.session).filter(Boolean))];
  const actualSetups = [...new Set(trades.map(t=>t.setup).filter(Boolean))];
  const maxTrades = journal.maxTrades || ac.rules?.maxTradesPerDay || 0;
  const sameSessionCount = journal.sessionFocus ? trades.filter(t=>t.session===journal.sessionFocus).length : 0;
  const sameSetupCount = journal.setupFocus ? trades.filter(t=>t.setup===journal.setupFocus).length : 0;
  let score = 100;
  if(journal.sessionFocus && trades.length) score -= Math.max(0, trades.length-sameSessionCount)*10;
  if(journal.setupFocus && trades.length) score -= Math.max(0, trades.length-sameSetupCount)*10;
  if(maxTrades>0 && trades.length>maxTrades) score -= (trades.length-maxTrades)*15;
  score -= trades.filter(t=>t.shouldTrade==='no').length*15;
  score -= trades.filter(t=>t.followPlan===false).length*12;
  score = Math.max(0,Math.min(100,Math.round(score)));
  return {journal,trades,actualSessions,actualSetups,maxTrades,score,sameSessionCount,sameSetupCount};
}
function calcClosingCoach(ac){
  const today = new Date().toISOString().slice(0,10);

    if(behavior.violations>0) bad.push(`今日出现 ${behavior.violations} 笔违规，优先修纪律而不是修策略。`);
    if(engine.status==='block') next.push('明天开盘先以恢复模式执行，不允许一上来就恢复正常风险。');
    if(engine.status==='caution') next.push('明天仅做 A+，最大风险和最大手数继续下调。');
    if(!next.length) next.push('保持当前节奏，优先复制今天最标准的那一笔。');
  }
  const summary = !trades.length
    ? '今天更像一次合格的等待，而不是错失。'
    : pnl>=0
      ? (behavior.score>=75 ? '今天属于“结果和过程都相对干净”的样本。' : '今天结果不差，但过程仍有瑕疵，不能被盈利掩盖。')
      : (behavior.totalFlags>0 ? '今天更大的问题在执行偏差，而不是策略本身。' : '今天是正常亏损样本，重点是保持结构。');
  return {good,bad,next,summary,pnl,trades:trades.length,behavior,plan,engine};
}
function calcSetupPanels(trades){

// ════ CALC STATS (PropTracker engine) ════
function calcS(aid){
  const tr=gtr(aid), ac=S.accounts.find(a=>a.id===aid);
  if(!ac)return null;
  const fees=ac.fees||{};
  const feeTotal=(fees.signup||0)+(fees.activation||0)+(fees.reset||0)+(fees.other||0);
  const total=tr.reduce((s,t)=>s+t.pnl,0);
  const netAfterFees=total-feeTotal;
  const bal=(ac.start||0)+total;
  const wd=gwd(aid);
  const totalWithdrawn=wd.reduce((s,w)=>s+w.amount,0);
  const r=ac.rules||{};

  // EOD trailing stop logic
  const dailyMap={};
  tr.forEach(t=>{if(!dailyMap[t.date])dailyMap[t.date]=[];dailyMap[t.date].push(t);});
  const sortedDays=Object.keys(dailyMap).sort();
  let eodFloor=(ac.start||0)-(r.maxDD||0);
  let hwm=ac.start||0;
  let runBal=ac.start||0;
  let isLocked=false;
  sortedDays.forEach(day=>{
    const dp=dailyMap[day].reduce((s,t)=>s+t.pnl,0);
    runBal+=dp;
    if(runBal>hwm){hwm=runBal;const nf=hwm-(r.maxDD||0);if(nf>=(ac.start||0)){eodFloor=ac.start||0;isLocked=true;}else{eodFloor=Math.max(eodFloor,nf);}}
  });
  const ddU=isLocked?Math.max(0,hwm-bal):Math.max(0,(r.maxDD||0)-(bal-eodFloor));
  const pureProfit=isLocked?bal-(ac.start||0):0;

  // Equity curve
  let run=ac.start||0;
  const ec=[ac.start||0],ed=['开始'];
  tr.forEach(t=>{run+=t.pnl;ec.push(run);ed.push(t.date.slice(5));});

  const today=new Date().toISOString().slice(0,10);
  const todayPnl=tr.filter(t=>t.date===today).reduce((s,t)=>s+t.pnl,0);
  const dp={};tr.forEach(t=>{dp[t.date]=(dp[t.date]||0)+t.pnl;});
  const wins=tr.filter(t=>t.pnl>0),loss=tr.filter(t=>t.pnl<0);
  const wr=tr.length>0?wins.length/tr.length*100:0;
  const gw=wins.reduce((s,t)=>s+t.pnl,0),gl=Math.abs(loss.reduce((s,t)=>s+t.pnl,0));
  const aw=wins.length>0?gw/wins.length:0,al=loss.length>0?gl/loss.length:0;
  const pf=gl>0?gw/gl:0;
  const days=new Set(tr.map(t=>t.date)).size;
  const dd=Object.keys(dp).sort(),dv=dd.map(d=>dp[d]);
  const worstDay=Object.values(dp).length>0?Math.min(...Object.values(dp)):0;
  const bestDay=Object.values(dp).length>0?Math.max(...Object.values(dp)):0;
  const planned=tr.filter(t=>t.followPlan!==false).length;
  const slOk=tr.filter(t=>t.stopLossRespected!==false).length;
  const revengeCount=tr.filter(t=>t.revenge===true).length;
  const fomoCount=tr.filter(t=>t.fomo===true).length;
  const execScore=tr.length>0?((planned/tr.length)*40+(slOk/tr.length)*30+((tr.length-revengeCount)/tr.length)*15+((tr.length-fomoCount)/tr.length)*15):0;
  const dailyRisk=Object.keys(dailyMap).sort().map(d=>({date:d,risk:dailyMap[d].reduce((s,t)=>s+(t.risk||0),0),pnl:dailyMap[d].reduce((s,t)=>s+t.pnl,0),count:dailyMap[d].length}));
  const maxTPD=dailyRisk.length>0?Math.max(...dailyRisk.map(x=>x.count)):0;
  const highRiskDays=dailyRisk.filter(x=>x.risk>=300).length;
  let cur=0,maxLS=0;
  tr.forEach(t=>{if(t.pnl<0){cur++;if(cur>maxLS)maxLS=cur;}else cur=0;});
  const avgRisk=tr.length>0?tr.reduce((s,t)=>s+(t.risk||0),0)/tr.length:0;
  const dowPnl={};

function symToMNQ(sym,c){const s=(sym||'').toUpperCase();if(s.includes('NQ')&&!s.includes('MNQ'))return c*10;if(s.includes('MNQ'))return c;if(s.includes('ES')&&!s.includes('MES'))return c*10;if(s.includes('MES'))return c;return c;}

function calcHealthScore(ac,s){

function calcAdvancedMetrics(trades){
  const total = trades.length || 0;
  const shouldYes = trades.filter(t => (t.shouldTrade || 'yes') === 'yes');
  const shouldNo = trades.filter(t => t.shouldTrade === 'no');
  const expectancyFor = arr => {
    if(!arr.length) return 0;
    const wins = arr.filter(t => (t.pnl||0) > 0);
    const losses = arr.filter(t => (t.pnl||0) < 0);
    const wr = wins.length / arr.length;
    const lr = losses.length / arr.length;
    const avgWin = wins.length ? wins.reduce((s,t)=>s+(t.pnl||0),0)/wins.length : 0;
    const avgLossAbs = losses.length ? Math.abs(losses.reduce((s,t)=>s+(t.pnl||0),0)/losses.length) : 0;
    return wr * avgWin - lr * avgLossAbs;
  };
  const violationCount = trades.filter(t => t.compliance?.status === 'violation').length;
  const suspectedCount = trades.filter(t => t.compliance?.status === 'suspected').length;
  const qualityA = trades.filter(t => t.tradeQuality === 'A').length;
  const qualityB = trades.filter(t => t.tradeQuality === 'B').length;
  const qualityC = trades.filter(t => t.tradeQuality === 'C').length;
  const holdTrades = trades.filter(t => Number.isFinite(+t.holdMinutes) && +t.holdMinutes > 0);
  const avgHold = holdTrades.length ? holdTrades.reduce((s,t)=>s+(+t.holdMinutes||0),0)/holdTrades.length : 0;
  const fastWins = trades.filter(t => (t.pnl||0) > 0 && (+t.holdMinutes||0) > 0 && (+t.holdMinutes||0) <= 15).length;
  const slowWins = trades.filter(t => (t.pnl||0) > 0 && (+t.holdMinutes||0) >= 45).length;
  const beHits = trades.filter(t => t.beHit === 'yes');
  const beRunYes = beHits.filter(t => t.beRunner === 'yes').length;
  return {
    total,
    violationCount,
    suspectedCount,
    violationRate: total ? violationCount/total*100 : 0,
    suspectedRate: total ? suspectedCount/total*100 : 0,
    qualityA, qualityB, qualityC,
    qualityARate: total ? qualityA/total*100 : 0,
    expectancyShouldTrade: expectancyFor(shouldYes),
    expectancyShouldNotTrade: expectancyFor(shouldNo),
    shouldTradeCount: shouldYes.length,
    shouldNotTradeCount: shouldNo.length,
    avgHold,
    fastWins,
    slowWins,
    beHits: beHits.length,
    beRunYes,
    beRunRate: beHits.length ? beRunYes/beHits.length*100 : 0,
    revengeCount: trades.filter(t=>t.revenge).length,
    fomoCount: trades.filter(t=>t.fomo).length,
    lowQualityCount: qualityC,
  };
}

function calcAllRisk(){

function calcNextTradeEngine(aid){
  const ac = S.accounts.find(a=>a.id===aid); if(!ac) return null;
  const stats = calcS(aid); const rules = ac.rules||{};
  const prot = RPE.check(S.accounts,S.trades);
  const guard = calcAccountGuard(ac);
  const state = calcAccountStateMachine(ac);
  const today = new Date().toISOString().slice(0,10);
  const tds = gtr(aid).filter(t=>t.date===today);
  let score = 100;
  const reasons = [];
  const dailyPct = rules.daily>0 ? Math.max(0,-stats.todayPnl)/rules.daily*100 : 0;
  const ddPct = rules.maxDD>0 ? stats.ddU/rules.maxDD*100 : 0;
  let consLoss = 0;
  for(let i=tds.length-1;i>=0;i--){ if((tds[i].pnl||0)<0) consLoss++; else break; }
  const last = tds[tds.length-1];
  const highRiskCount = tds.filter(t=>t.riskLabel==='high').length;
  const suspiciousCount = tds.filter(t=>['suspected','violation'].includes(t.compliance?.status)).length;
  if(dailyPct>=40){ score -= 15; reasons.push(`今日亏损已用 ${dailyPct.toFixed(0)}%`); }
  if(dailyPct>=60){ score -= 20; reasons.push('进入日内警戒区'); }
  if(dailyPct>=85){ score -= 30; reasons.push('接近日亏极限'); }
  if(ddPct>=60){ score -= 12; reasons.push(`总回撤使用 ${ddPct.toFixed(0)}%`); }
  if(consLoss>=2){ score -= 10; reasons.push(`已连续亏损 ${consLoss} 笔`); }
  if(consLoss>=3){ score -= 15; reasons.push('连续亏损偏高，建议冷静'); }
  if(rules.maxTradesPerDay>0 && tds.length>=rules.maxTradesPerDay){ score -= 25; reasons.push(`今日已达最大笔数 ${rules.maxTradesPerDay}`); }
  if(tds.length>=3){ score -= (tds.length-2)*5; }
  if(highRiskCount>0){ score -= highRiskCount*8; reasons.push(`今日已有 ${highRiskCount} 笔高风险单`); }
  if(suspiciousCount>0){ score -= suspiciousCount*6; reasons.push(`今日存在 ${suspiciousCount} 笔疑似/违规单`); }
  if(last){
    if(last.revenge) { score -= 12; reasons.push('上一笔为报复性交易'); }
    if(last.fomo) { score -= 10; reasons.push('上一笔带有 FOMO'); }
    if(last.followPlan===false) { score -= 8; reasons.push('上一笔未按计划执行'); }
    if(last.stopLossRespected===false) { score -= 10; reasons.push('上一笔未严格止损'); }
  }
  if(prot.isActive){
    if(ac.role==='aggressive'){ score -= 40; reasons.push('风险保护模式下激进账户禁用'); }
    else if(ac.role==='backup'){ score -= 25; reasons.push('风险保护模式下备用账户受限'); }
    else if(ac.role==='conservative'){ reasons.push('当前仅允许低风险执行'); }
  }
  if(state.state==='restricted'){ score = Math.min(score, 68); reasons.push('账户状态机：限制模式'); }
  if(state.state==='recovery'){ score = Math.min(score, 78); reasons.push('账户状态机：恢复中'); }
  if(state.state==='frozen'){ score = Math.min(score, 20); reasons.push('账户状态机：冻结'); }
  if(guard.status==='blocked'){ score = Math.min(score, 35); reasons.push('系统门禁已阻止继续交易'); }
  else if(guard.status==='caution'){ score = Math.min(score, 68); reasons.push('系统门禁要求缩仓'); }
  score = Math.max(0,Math.min(100,Math.round(score)));

  let status='allow';
  if(state.state==='frozen' || guard.status==='blocked') status='block';
  else if(prot.isActive && ['aggressive'].includes(ac.role)) status='block';
  else if(prot.isActive && ac.role==='backup') status='block';
  else if(dailyPct>=90 || ddPct>=90) status='block';
  else if(rules.maxTradesPerDay>0 && tds.length>=rules.maxTradesPerDay) status='block';
  else if(consLoss>=4) status='block';
  else if(score<55) status='block';
  else if(state.state==='restricted' || state.state==='recovery' || score<75 || dailyPct>=60 || consLoss>=2) status='caution';

  const baseLots = ac.lotTier||1;
  let maxLots = baseLots || 1;
  let maxRisk = rules.daily ? Math.max(50, rules.daily*0.2) : 150;
  let allowedSetup = 'A+, A';
  let allowedSessions = 'NY AM / London';
  let allowNewPositions = true;

  if(state.state==='recovery'){
    maxLots = Math.max(1, Math.floor((baseLots||1)/2));
    maxRisk = Math.max(35, maxRisk*0.35);
    allowedSetup = 'A+, A';
    allowedSessions = '核心时段优先';
  }
  if(status==='caution'){
    maxLots = Math.max(1, Math.floor((baseLots||1)/2));
    maxRisk = Math.max(30, maxRisk*0.5);
    allowedSetup = state.state==='restricted' ? 'A+ only' : allowedSetup;
  }
  if(state.state==='restricted'){
    maxLots = Math.max(1, Math.floor((baseLots||1)/2));
    maxRisk = Math.max(25, maxRisk*0.25);
    allowedSetup = 'A+ only';
    allowedSessions = '只做计划内 session';
  }
  if(status==='block'){
    maxLots = 0; maxRisk = 0; allowedSetup = 'none'; allowedSessions='none'; allowNewPositions=false;
  }
  return {score,status,reasons:[...new Set(reasons)],dailyPct,ddPct,consLoss,todayTrades:tds.length,maxLots,maxRisk,allowedSetup,allowedSessions,allowNewPositions,state};
}

  } else if(state.state==='recovery' || ac.role==='recovery'){
    mode='recovery';
    canTrade=true;
    maxTrades=Math.min(2, baseTrades);
    maxRisk=Math.max(35, Math.round(baseRisk*0.5));
    maxLots=Math.max(1, Math.floor((ac.lotTier||1)/2)||1);
    setups='A / A+';

  const summary = [
